<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Inventory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222533;
    --border: #2e3349;
    --accent: #f5a623;
    --accent2: #e8f54a;
    --danger: #e84a4a;
    --text: #d4d8e8;
    --muted: #6b7280;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: var(--sans);
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }
  header h1 span { color: var(--text); }

  .search-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .search-wrap input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 12px;
    width: 240px;
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* ── Layout ── */
  .app { display: flex; height: calc(100vh - 56px); }

  nav {
    width: 200px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0;
  }
  nav button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 20px;
    cursor: pointer;
    transition: all .15s;
    border-left: 3px solid transparent;
  }
  nav button:hover { color: var(--text); background: var(--surface2); }
  nav button.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* ── Panels ── */
  .panel { display: none; }
  .panel.active { display: block; }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .panel-header h2 {
    font-family: var(--sans);
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Buttons ── */
  .btn {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: none;
    padding: 9px 18px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #ffbe4a; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #ff6060; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 6px; transition: color .15s; }
  .btn-icon:hover { color: var(--accent); }
  .btn-icon.danger:hover { color: var(--danger); }

  /* ── Cards / Grid ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .grid-wide { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0;
    transition: border-color .15s;
    cursor: pointer;
  }
  .card:hover { border-color: var(--accent); }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .box-num {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--accent);
    color: #000;
    padding: 2px 7px;
    font-weight: bold;
  }
  .card-title { font-size: 16px; font-weight: 700; flex: 1; }
  .card-body { padding: 12px 16px; }
  .card-meta { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .card-actions { display: flex; gap: 6px; margin-top: 10px; }

  .room-badge {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 2px 8px;
  }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 15px; }
  tr:hover td { background: var(--surface2); }
  .mono { font-family: var(--mono); font-size: 13px; }

  /* ── Modal ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    width: 520px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal h3 {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

  /* ── Forms ── */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 9px 12px;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field select option { background: var(--bg); }

  /* ── Tag chips ── */
  .chip {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    margin: 2px;
    color: var(--muted);
  }
  .chip.cat { color: var(--accent2); border-color: var(--accent2); }

  /* ── Box detail ── */
  .box-detail { max-width: 800px; }
  .box-detail-header {
    display: flex; align-items: flex-start; gap: 20px;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .box-num-large {
    font-family: var(--mono);
    font-size: 48px;
    font-weight: bold;
    color: var(--accent);
    line-height: 1;
    min-width: 80px;
  }
  .box-num-large::before { content: '#'; font-size: 24px; vertical-align: top; margin-top: 4px; display: inline-block; }

  .items-table-wrap { margin-top: 16px; }
  .add-item-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .add-item-row .field { margin: 0; flex: 1; min-width: 140px; }

  /* ── Print / QR ── */
  .print-modal { text-align: center; }
  .print-modal .qr-wrap { display: inline-block; border: 4px solid #000; padding: 12px; background: #fff; margin-bottom: 12px; }
  .print-modal .label-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px;
    font-weight: 900;
    color: #000;
    line-height: 1;
    background: #fff;
    padding: 4px 16px;
    display: inline-block;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .print-modal .label-text {
    font-size: 18px;
    font-weight: 700;
    color: #333;
    background: #fff;
    padding: 2px 12px;
    display: block;
    max-width: 200px;
    margin: 0 auto;
    word-break: break-word;
  }
  .print-preview {
    background: #fff;
    color: #000;
    padding: 16px;
    display: inline-block;
    border: 2px dashed var(--border);
    text-align: center;
  }

  @media print {
    body * { visibility: hidden; }
    .print-preview, .print-preview * { visibility: visible; }
    .print-preview {
      position: fixed;
      top: 0; left: 0;
      border: none;
      padding: 8px;
    }
  }

  /* ── Search results ── */
  .search-results { max-width: 800px; }
  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  /* ── Room panel ── */
  .room-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .room-card .room-name { font-size: 18px; font-weight: 700; flex: 1; }
  .room-card .room-count { font-family: var(--mono); font-size: 13px; color: var(--muted); }

  .empty { color: var(--muted); font-family: var(--mono); font-size: 14px; padding: 32px; text-align: center; }

  .tag-accent { color: var(--accent); }
  .tag-green { color: var(--accent2); }

  /* ── Autocomplete ── */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--accent);
    z-index: 50;
    max-height: 180px;
    overflow-y: auto;
    display: none;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .autocomplete-item:hover { background: var(--border); color: var(--accent); }
  .autocomplete-item small { color: var(--muted); margin-left: 8px; font-family: var(--mono); font-size: 11px; }
</style>
</head>
<body>

<header>
  <h1>BOX<span>TRACK</span></h1>
  <div class="search-wrap">
    <input type="text" id="globalSearch" placeholder="Search items, categories, labels…" oninput="handleGlobalSearch(this.value)">
  </div>
</header>

<div class="app">
  <nav>
    <button class="active" onclick="showPanel('boxes')">📦 Boxes</button>
    <button onclick="showPanel('rooms')">🏠 Rooms</button>
    <button onclick="showPanel('items')">📋 Items</button>
  </nav>

  <main>
    <!-- BOXES PANEL -->
    <div id="panel-boxes" class="panel active">
      <div class="panel-header">
        <h2>Boxes</h2>
        <button class="btn btn-primary" onclick="openNewBoxModal()">+ New Box</button>
      </div>
      <div id="boxes-filter" style="margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <label style="font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)">Filter by room:</label>
        <select id="roomFilter" onchange="loadBoxes()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:14px;padding:6px 10px;">
          <option value="">All Rooms</option>
        </select>
      </div>
      <div id="boxes-grid" class="grid grid-wide"></div>
    </div>

    <!-- BOX DETAIL PANEL -->
    <div id="panel-box-detail" class="panel">
      <div id="box-detail-content"></div>
    </div>

    <!-- ROOMS PANEL -->
    <div id="panel-rooms" class="panel">
      <div class="panel-header">
        <h2>Rooms</h2>
        <button class="btn btn-primary" onclick="openRoomModal()">+ Add Room</button>
      </div>
      <div id="rooms-list" style="display:flex;flex-direction:column;gap:10px;max-width:600px;"></div>
    </div>

    <!-- ITEMS PANEL -->
    <div id="panel-items" class="panel">
      <div class="panel-header">
        <h2>Items</h2>
        <button class="btn btn-primary" onclick="openItemModal()">+ Add Item</button>
      </div>
      <div style="margin-bottom:16px;">
        <input type="text" id="itemSearch" placeholder="Filter items…" oninput="filterItems(this.value)"
          style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 12px;width:280px;outline:none;">
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Category</th><th>In Boxes</th><th></th></tr></thead>
          <tbody id="items-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- SEARCH RESULTS -->
    <div id="panel-search" class="panel">
      <div class="panel-header"><h2>Search Results</h2></div>
      <div id="search-results" class="search-results"></div>
    </div>
  </main>
</div>

<!-- ── MODALS ── -->

<!-- New/Edit Box Modal -->
<div id="modal-box" class="modal-backdrop">
  <div class="modal">
    <h3 id="modal-box-title">New Box</h3>
    <div class="field">
      <label>Label / Description (optional)</label>
      <input type="text" id="box-label" placeholder="e.g. Kitchen Appliances">
    </div>
    <div class="field">
      <label>Room</label>
      <select id="box-room"></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-box')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBox()">Save Box</button>
    </div>
  </div>
</div>

<!-- Room Modal -->
<div id="modal-room" class="modal-backdrop">
  <div class="modal">
    <h3 id="modal-room-title">Add Room</h3>
    <div class="field">
      <label>Room Name</label>
      <input type="text" id="room-name" placeholder="e.g. Living Room">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-room')">Cancel</button>
      <button class="btn btn-primary" onclick="saveRoom()">Save Room</button>
    </div>
  </div>
</div>

<!-- Item Modal -->
<div id="modal-item" class="modal-backdrop">
  <div class="modal">
    <h3 id="modal-item-title">Add Item</h3>
    <div class="field">
      <label>Item Name</label>
      <input type="text" id="item-name" placeholder="e.g. Rice Cooker">
    </div>
    <div class="field">
      <label>Category</label>
      <div class="autocomplete-wrap">
        <input type="text" id="item-category" placeholder="e.g. Kitchen" oninput="showCatSuggestions(this.value)" autocomplete="off">
        <div id="cat-suggestions" class="autocomplete-list"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-item')">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<!-- Print / QR Modal -->
<div id="modal-print" class="modal-backdrop">
  <div class="modal print-modal">
    <h3>Print Label</h3>
    <div class="print-preview" id="print-target">
      <div class="qr-wrap" id="qr-container"></div>
      <div class="label-num" id="print-box-num"></div>
      <div class="label-text" id="print-box-label"></div>
    </div>
    <div class="modal-actions" style="justify-content:center;margin-top:16px;">
      <button class="btn btn-secondary" onclick="closeModal('modal-print')">Close</button>
      <button class="btn btn-primary" onclick="window.print()">🖨 Print</button>
    </div>
  </div>
</div>

<!-- Add Item to Box Modal -->
<div id="modal-add-to-box" class="modal-backdrop">
  <div class="modal">
    <h3>Add Item to Box</h3>
    <div class="field">
      <label>Item</label>
      <div class="autocomplete-wrap">
        <input type="text" id="atb-item-search" placeholder="Search items…" oninput="searchItemsForBox(this.value)" autocomplete="off">
        <div id="atb-item-suggestions" class="autocomplete-list"></div>
        <input type="hidden" id="atb-item-id">
      </div>
    </div>
    <div class="field">
      <label>Quantity</label>
      <input type="number" id="atb-qty" value="1" min="1">
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="atb-notes" placeholder="e.g. cables in side pocket">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-to-box')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddToBox()">Add to Box</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let rooms = [];
let allItems = [];
let categories = [];
let editingBox = null;
let editingRoom = null;
let editingItem = null;
let currentBoxId = null;
let addToBoxId = null;
let searchTimeout = null;

const API = '';  // same origin

// ── Utilities ──────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, isError = false) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:999;padding:12px 20px;
    background:${isError ? 'var(--danger)' : 'var(--accent)'};color:#000;
    font-family:var(--sans);font-weight:700;font-size:14px;letter-spacing:1px;
    box-shadow:0 4px 20px rgba(0,0,0,.4);`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── Navigation ─────────────────────────────────────────────────────────────
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  const btns = { boxes: 0, rooms: 1, items: 2 };
  if (btns[name] !== undefined)
    document.querySelectorAll('nav button')[btns[name]].classList.add('active');

  if (name === 'boxes') loadBoxes();
  if (name === 'rooms') loadRooms();
  if (name === 'items') loadItems();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close modal on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(bd => {
  bd.addEventListener('click', e => { if (e.target === bd) bd.classList.remove('open'); });
});

// ── Rooms ──────────────────────────────────────────────────────────────────
async function loadRooms() {
  rooms = await api('/api/rooms');
  // Update room filter
  const filter = document.getElementById('roomFilter');
  const prev = filter.value;
  filter.innerHTML = '<option value="">All Rooms</option>' +
    rooms.map(r => `<option value="${r.id}" ${prev==r.id?'selected':''}>${esc(r.name)}</option>`).join('');
  // Update rooms list panel
  const list = document.getElementById('rooms-list');
  if (!rooms.length) { list.innerHTML = '<div class="empty">No rooms yet.</div>'; return; }
  list.innerHTML = rooms.map(r => `
    <div class="room-card">
      <div class="room-name">${esc(r.name)}</div>
      <div class="room-count">${r.box_count} box${r.box_count!=1?'es':''}</div>
      <button class="btn-icon" onclick="openRoomModal(${r.id})">✏️</button>
      <button class="btn-icon danger" onclick="deleteRoom(${r.id})">🗑</button>
    </div>
  `).join('');
}

function openRoomModal(id = null) {
  editingRoom = id;
  document.getElementById('modal-room-title').textContent = id ? 'Edit Room' : 'Add Room';
  const r = id ? rooms.find(x => x.id === id) : null;
  document.getElementById('room-name').value = r ? r.name : '';
  openModal('modal-room');
}

async function saveRoom() {
  const name = document.getElementById('room-name').value.trim();
  if (!name) { toast('Room name is required', true); return; }
  try {
    if (editingRoom) {
      await api(`/api/rooms/${editingRoom}`, { method: 'PUT', body: JSON.stringify({ name }) });
    } else {
      await api('/api/rooms', { method: 'POST', body: JSON.stringify({ name }) });
    }
    closeModal('modal-room');
    await loadRooms();
    toast(editingRoom ? 'Room updated' : 'Room added');
  } catch(e) { toast(e.message, true); }
}

async function deleteRoom(id) {
  if (!confirm('Delete this room? Boxes will become unassigned.')) return;
  await api(`/api/rooms/${id}`, { method: 'DELETE' });
  await loadRooms();
  toast('Room deleted');
}

// ── Boxes ──────────────────────────────────────────────────────────────────
async function loadBoxes() {
  await loadRooms();
  const roomId = document.getElementById('roomFilter').value;
  const url = roomId ? `/api/boxes?room_id=${roomId}` : '/api/boxes';
  const boxes = await api(url);
  const grid = document.getElementById('boxes-grid');
  if (!boxes.length) { grid.innerHTML = '<div class="empty">No boxes yet. Create one to get started.</div>'; return; }
  grid.innerHTML = boxes.map(b => `
    <div class="card" onclick="openBoxDetail(${b.id})">
      <div class="card-header">
        <span class="box-num">BOX ${b.box_number}</span>
        <span class="card-title">${esc(b.label || '—')}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">${b.room_name ? `📍 ${esc(b.room_name)}` : '<span style="color:var(--muted)">No room assigned</span>'}</div>
        <div class="card-meta">${b.item_count} item type${b.item_count!=1?'s':''} · ${b.total_qty} total qty</div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-sm btn-secondary" onclick="openBoxDetail(${b.id})">View</button>
          <button class="btn btn-sm btn-secondary" onclick="openNewBoxModal(${b.id})">Edit</button>
          <button class="btn btn-sm btn-primary" onclick="openPrintModal(${b.id})">🖨 Label</button>
          <button class="btn btn-sm btn-danger" onclick="deleteBox(${b.id})">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openNewBoxModal(id = null) {
  editingBox = id;
  document.getElementById('modal-box-title').textContent = id ? 'Edit Box' : 'New Box';
  const roomSel = document.getElementById('box-room');
  roomSel.innerHTML = '<option value="">— No Room —</option>' +
    rooms.map(r => `<option value="${r.id}">${esc(r.name)}</option>`).join('');
  if (id) {
    // find from existing render
    api(`/api/boxes/${id}`).then(box => {
      document.getElementById('box-label').value = box.label || '';
      roomSel.value = box.room_id || '';
    });
  } else {
    document.getElementById('box-label').value = '';
    roomSel.value = '';
  }
  openModal('modal-box');
}

async function saveBox() {
  const label = document.getElementById('box-label').value.trim();
  const room_id = document.getElementById('box-room').value || null;
  try {
    if (editingBox) {
      await api(`/api/boxes/${editingBox}`, { method: 'PUT', body: JSON.stringify({ label, room_id }) });
      closeModal('modal-box');
      toast('Box updated');
      openBoxDetail(editingBox);
    } else {
      const box = await api('/api/boxes', { method: 'POST', body: JSON.stringify({ label, room_id }) });
      closeModal('modal-box');
      toast(`Box #${box.box_number} created`);
      loadBoxes();
    }
  } catch(e) { toast(e.message, true); }
}

async function deleteBox(id) {
  if (!confirm('Delete this box and all its contents?')) return;
  await api(`/api/boxes/${id}`, { method: 'DELETE' });
  toast('Box deleted');
  showPanel('boxes');
}

// ── Box Detail ─────────────────────────────────────────────────────────────
async function openBoxDetail(id) {
  currentBoxId = id;
  const box = await api(`/api/boxes/${id}`);
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-box-detail');
  panel.classList.add('active');

  const itemRows = box.items.length
    ? box.items.map(i => `
        <tr>
          <td>${esc(i.name)}</td>
          <td><span class="chip cat">${esc(i.category || '—')}</span></td>
          <td class="mono">${i.quantity}</td>
          <td>${esc(i.notes || '')}</td>
          <td>
            <button class="btn-icon" onclick="editBoxItem(${i.box_item_id}, ${i.quantity}, ${JSON.stringify(esc(i.notes||''))})">✏️</button>
            <button class="btn-icon danger" onclick="removeBoxItem(${i.box_item_id})">🗑</button>
          </td>
        </tr>
      `).join('')
    : `<tr><td colspan="5" class="empty">No items in this box yet.</td></tr>`;

  panel.innerHTML = `
    <div class="box-detail">
      <div style="margin-bottom:16px;">
        <button class="btn btn-secondary btn-sm" onclick="showPanel('boxes')">← Back</button>
      </div>
      <div class="box-detail-header">
        <div class="box-num-large">${box.box_number}</div>
        <div>
          <div style="font-size:24px;font-weight:900;">${esc(box.label || 'Unlabelled Box')}</div>
          <div style="color:var(--muted);font-family:var(--mono);font-size:13px;margin-top:4px;">
            📍 ${esc(box.room_name || 'No room assigned')}
          </div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-secondary btn-sm" onclick="openNewBoxModal(${box.id})">Edit Box</button>
          <button class="btn btn-primary btn-sm" onclick="openPrintModal(${box.id})">🖨 Print Label</button>
          <button class="btn btn-danger btn-sm" onclick="deleteBox(${box.id})">Delete Box</button>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <h3 style="font-size:16px;letter-spacing:2px;text-transform:uppercase;">Contents (${box.items.length} types)</h3>
        <button class="btn btn-primary btn-sm" onclick="openAddToBoxModal(${box.id})">+ Add Item</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Item</th><th>Category</th><th>Qty</th><th>Notes</th><th></th></tr></thead>
          <tbody id="box-items-tbody">${itemRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

async function removeBoxItem(boxItemId) {
  if (!confirm('Remove this item from the box?')) return;
  await api(`/api/box-items/${boxItemId}`, { method: 'DELETE' });
  toast('Item removed');
  openBoxDetail(currentBoxId);
}

async function editBoxItem(boxItemId, currentQty, currentNotes) {
  const qty = prompt('New quantity:', currentQty);
  if (qty === null) return;
  const notes = prompt('Notes:', currentNotes);
  await api(`/api/box-items/${boxItemId}`, {
    method: 'PUT',
    body: JSON.stringify({ quantity: parseInt(qty) || 1, notes })
  });
  toast('Updated');
  openBoxDetail(currentBoxId);
}

// ── Add Item to Box ────────────────────────────────────────────────────────
async function openAddToBoxModal(boxId) {
  addToBoxId = boxId;
  document.getElementById('atb-item-search').value = '';
  document.getElementById('atb-item-id').value = '';
  document.getElementById('atb-qty').value = '1';
  document.getElementById('atb-notes').value = '';
  document.getElementById('atb-item-suggestions').classList.remove('open');
  openModal('modal-add-to-box');
}

async function searchItemsForBox(q) {
  const list = document.getElementById('atb-item-suggestions');
  document.getElementById('atb-item-id').value = '';
  if (!q.trim()) { list.classList.remove('open'); return; }
  const items = await api(`/api/items?q=${encodeURIComponent(q)}`);
  if (!items.length) { list.classList.remove('open'); return; }
  list.innerHTML = items.map(i => `
    <div class="autocomplete-item" onclick="selectBoxItem(${i.id}, ${JSON.stringify(esc(i.name))}, ${JSON.stringify(esc(i.category||''))})">
      ${esc(i.name)} <small>${esc(i.category || '')}</small>
    </div>
  `).join('');
  list.classList.add('open');
}

function selectBoxItem(id, name, cat) {
  document.getElementById('atb-item-search').value = name;
  document.getElementById('atb-item-id').value = id;
  document.getElementById('atb-item-suggestions').classList.remove('open');
}

async function confirmAddToBox() {
  const item_id = document.getElementById('atb-item-id').value;
  const qty = parseInt(document.getElementById('atb-qty').value) || 1;
  const notes = document.getElementById('atb-notes').value.trim();

  // Allow creating a new item on the fly if nothing selected
  if (!item_id) {
    const name = document.getElementById('atb-item-search').value.trim();
    if (!name) { toast('Select or type an item name', true); return; }
    const newItem = await api('/api/items', { method: 'POST', body: JSON.stringify({ name }) });
    await api(`/api/boxes/${addToBoxId}/items`, { method: 'POST', body: JSON.stringify({ item_id: newItem.id, quantity: qty, notes }) });
  } else {
    await api(`/api/boxes/${addToBoxId}/items`, { method: 'POST', body: JSON.stringify({ item_id, quantity: qty, notes }) });
  }
  closeModal('modal-add-to-box');
  toast('Item added to box');
  openBoxDetail(addToBoxId);
}

// ── Items ──────────────────────────────────────────────────────────────────
async function loadItems() {
  allItems = await api('/api/items');
  categories = await api('/api/items/categories');
  renderItems(allItems);
}

function renderItems(items) {
  const tbody = document.getElementById('items-tbody');
  if (!items.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">No items yet.</td></tr>'; return; }
  tbody.innerHTML = items.map(i => `
    <tr>
      <td>${esc(i.name)}</td>
      <td><span class="chip cat">${esc(i.category || '—')}</span></td>
      <td class="mono">${i.in_boxes ? i.in_boxes.split(',').map(n => `<span class="chip">#${n}</span>`).join('') : '<span style="color:var(--muted)">none</span>'}</td>
      <td>
        <button class="btn-icon" onclick="openItemModal(${i.id})">✏️</button>
        <button class="btn-icon danger" onclick="deleteItem(${i.id})">🗑</button>
      </td>
    </tr>
  `).join('');
}

function filterItems(q) {
  if (!q) { renderItems(allItems); return; }
  const lq = q.toLowerCase();
  renderItems(allItems.filter(i =>
    i.name.toLowerCase().includes(lq) || (i.category || '').toLowerCase().includes(lq)
  ));
}

function openItemModal(id = null) {
  editingItem = id;
  document.getElementById('modal-item-title').textContent = id ? 'Edit Item' : 'Add Item';
  const item = id ? allItems.find(x => x.id === id) : null;
  document.getElementById('item-name').value = item ? item.name : '';
  document.getElementById('item-category').value = item ? (item.category || '') : '';
  document.getElementById('cat-suggestions').classList.remove('open');
  openModal('modal-item');
}

function showCatSuggestions(q) {
  const list = document.getElementById('cat-suggestions');
  const matches = categories.filter(c => c.toLowerCase().includes(q.toLowerCase()));
  if (!matches.length || !q) { list.classList.remove('open'); return; }
  list.innerHTML = matches.map(c => `<div class="autocomplete-item" onclick="selectCat('${esc(c)}')">${esc(c)}</div>`).join('');
  list.classList.add('open');
}

function selectCat(c) {
  document.getElementById('item-category').value = c;
  document.getElementById('cat-suggestions').classList.remove('open');
}

async function saveItem() {
  const name = document.getElementById('item-name').value.trim();
  const category = document.getElementById('item-category').value.trim() || null;
  if (!name) { toast('Item name required', true); return; }
  try {
    if (editingItem) {
      await api(`/api/items/${editingItem}`, { method: 'PUT', body: JSON.stringify({ name, category }) });
      toast('Item updated');
    } else {
      await api('/api/items', { method: 'POST', body: JSON.stringify({ name, category }) });
      toast('Item added');
    }
    closeModal('modal-item');
    await loadItems();
  } catch(e) { toast(e.message, true); }
}

async function deleteItem(id) {
  if (!confirm('Delete this item? It will be removed from all boxes.')) return;
  await api(`/api/items/${id}`, { method: 'DELETE' });
  toast('Item deleted');
  await loadItems();
}

// ── Print / QR ─────────────────────────────────────────────────────────────
async function openPrintModal(boxId) {
  const box = await api(`/api/boxes/${boxId}`);
  const qrContainer = document.getElementById('qr-container');
  qrContainer.innerHTML = '';
  const url = `${location.origin}/?box=${box.box_number}`;
  new QRCode(qrContainer, { text: url, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.M });
  document.getElementById('print-box-num').textContent = `BOX ${box.box_number}`;
  document.getElementById('print-box-label').textContent = box.label || (box.room_name || '');
  openModal('modal-print');
}

// ── Global Search ──────────────────────────────────────────────────────────
function handleGlobalSearch(q) {
  clearTimeout(searchTimeout);
  if (!q.trim()) { showPanel('boxes'); return; }
  searchTimeout = setTimeout(() => doSearch(q), 300);
}

async function doSearch(q) {
  const results = await api(`/api/search?q=${encodeURIComponent(q)}`);
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-search').classList.add('active');
  const div = document.getElementById('search-results');
  if (!results.length) {
    div.innerHTML = '<div class="empty">No results found.</div>';
    return;
  }
  // Group by box
  const byBox = {};
  results.forEach(r => {
    if (!byBox[r.box_id]) byBox[r.box_id] = { ...r, matches: [] };
    byBox[r.box_id].matches.push(r);
  });
  div.innerHTML = Object.values(byBox).map(b => `
    <div class="result-item" onclick="openBoxDetail(${b.box_id})" style="cursor:pointer;">
      <span class="box-num" style="flex-shrink:0;">BOX ${b.box_number}</span>
      <div>
        <div style="font-weight:700;">${esc(b.label || 'Unlabelled')}</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--muted);">📍 ${esc(b.room_name || 'No room')}</div>
        <div style="margin-top:4px;">
          ${b.matches.map(m => `<span class="chip">${esc(m.item_name)} <span style="color:var(--muted)">×${m.quantity}</span></span>`).join('')}
        </div>
      </div>
      <button class="btn btn-sm btn-primary" style="margin-left:auto;flex-shrink:0;" onclick="event.stopPropagation();openPrintModal(${b.box_id})">🖨 Label</button>
    </div>
  `).join('');
}

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  await loadRooms();
  loadBoxes();
})();
</script>
</body>
</html>
