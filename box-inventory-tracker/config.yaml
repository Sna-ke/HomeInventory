name: "Box Inventory Tracker"
description: "Track packed items in boxes across rooms, with QR code label printing."
version: "1.8.3"
slug: "box_inventory"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
build_from:
  aarch64: "ghcr.io/home-assistant/aarch64-base:latest"
  amd64: "ghcr.io/home-assistant/amd64-base:latest"
  armhf: "ghcr.io/home-assistant/armhf-base:latest"
  armv7: "ghcr.io/home-assistant/armv7-base:latest"
  i386: "ghcr.io/home-assistant/i386-base:latest"
startup: application
boot: auto
homeassistant_api: true
services:
  - mysql:want
map:
  - data:rw
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: "Web UI"
options:
  vision_backend: "none"
  anthropic_api_key: ""
  ollama_url: "http://homeassistant.local:11434"
  ollama_model: "llava"
schema:
  vision_backend: "list(none|anthropic|ollama)"
  anthropic_api_key: str
  ollama_url: str
  ollama_model: str
panel_icon: mdi:package-variant
panel_title: Home Inventory
panel_admin: false
ingress: true
ingress_port: 0