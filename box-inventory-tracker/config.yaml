name: "Box Inventory Tracker"
description: "Track packed items in boxes across rooms, with QR code label printing."
version: "1.1.4"
slug: "box_inventory"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
build_from:
  aarch64: "ghcr.io/home-assistant/aarch64-base:latest"
  amd64: "ghcr.io/home-assistant/amd64-base:latest"
  armhf: "ghcr.io/home-assistant/armhf-base:latest"
  armv7: "ghcr.io/home-assistant/armv7-base:latest"
  i386: "ghcr.io/home-assistant/i386-base:latest"
startup: application
boot: auto
services:
  - mysql:want
map:
  - data:rw
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: "Web UI"
options: {}
schema: {}
panel_icon: mdi:package-variant-closed
panel_title: Box Inventory
