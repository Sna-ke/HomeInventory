<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>BoxTrack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222533;
  --border: #2e3349;
  --accent: #f5a623;
  --accent2: #e8f54a;
  --danger: #e84a4a;
  --text: #d4d8e8;
  --muted: #6b7280;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Barlow Condensed', sans-serif;
  --nav-h: 56px;
  --tab-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
}

/* ── Top bar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--surface);
  border-bottom: 2px solid var(--accent);
  display: flex; align-items: center; gap: 10px; padding: 0 12px;
}
.topbar h1 {
  font-family: var(--sans); font-weight: 900; font-size: 20px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  white-space: nowrap;
}
.topbar h1 span { color: var(--text); }
.topbar .search-box {
  flex: 1; min-width: 0;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 13px;
  padding: 7px 10px; outline: none; transition: border-color .15s;
  max-width: 360px; margin-left: auto;
}
.topbar .search-box:focus { border-color: var(--accent); }
.topbar .search-box::placeholder { color: var(--muted); }

/* ── Bottom tab bar (mobile nav) ── */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
}
.tabbar button {
  flex: 1; background: none; border: none; color: var(--muted);
  font-family: var(--sans); font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; cursor: pointer;
  transition: color .15s; padding: 0;
  border-top: 2px solid transparent;
}
.tabbar button .icon { font-size: 20px; line-height: 1; }
.tabbar button.active { color: var(--accent); border-top-color: var(--accent); }

/* ── Scrollable content area ── */
.content {
  position: fixed;
  top: var(--nav-h);
  bottom: calc(var(--tab-h) + var(--safe-bottom));
  left: 0; right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── Panels ── */
.panel { display: none; padding: 16px; min-height: 100%; }
.panel.active { display: block; }

.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.panel-hdr h2 {
  font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
}

/* ── Buttons ── */
.btn {
  font-family: var(--sans); font-weight: 700; font-size: 14px;
  letter-spacing: 1.5px; text-transform: uppercase;
  border: none; padding: 10px 16px; cursor: pointer;
  transition: all .15s; white-space: nowrap; display: inline-flex;
  align-items: center; gap: 6px; touch-action: manipulation;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:active { background: #ffbe4a; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:active { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.btn-icon {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 18px; padding: 6px; transition: color .15s;
  touch-action: manipulation;
}
.btn-icon:active { color: var(--accent); }
.btn-icon.danger:active { color: var(--danger); }

/* ── Cards ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  transition: border-color .15s;
  overflow: hidden;
}
.card:active { border-color: var(--accent); }

.card-thumb {
  width: 100%; aspect-ratio: 16/9; object-fit: cover;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  color: var(--border); font-size: 32px;
}
.card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

.card-body { padding: 12px; }
.card-num {
  font-family: var(--mono); font-size: 11px;
  background: var(--accent); color: #000; padding: 1px 6px;
  display: inline-block; margin-bottom: 6px;
}
.card-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.card-meta { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.card-desc { font-size: 14px; color: var(--muted); margin-top: 4px; }
.card-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

/* ── Detail view ── */
.detail { max-width: 700px; }
.detail-back { margin-bottom: 14px; }
.detail-hdr {
  display: flex; align-items: flex-start; gap: 14px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.detail-num {
  font-family: var(--mono); font-size: 40px; font-weight: bold;
  color: var(--accent); line-height: 1; flex-shrink: 0;
}
.detail-num::before { content: '#'; font-size: 20px; vertical-align: top; margin-top: 3px; display: inline-block; }
.detail-title { font-size: 22px; font-weight: 900; }
.detail-room { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 3px; }
.detail-desc { font-size: 15px; color: var(--text); margin-top: 6px; line-height: 1.5; }
.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }

/* ── Image gallery ── */
.gallery { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
.gallery-item {
  position: relative; width: 80px; height: 80px;
  flex-shrink: 0;
}
.gallery-item img {
  width: 100%; height: 100%; object-fit: cover;
  border: 1px solid var(--border); display: block;
}
.gallery-item .del-img {
  position: absolute; top: 2px; right: 2px;
  background: rgba(0,0,0,.7); border: none; color: #fff;
  font-size: 12px; cursor: pointer; padding: 2px 4px; line-height: 1;
}
.gallery-add {
  width: 80px; height: 80px; flex-shrink: 0;
  background: var(--surface2); border: 1px dashed var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--muted); cursor: pointer;
  transition: border-color .15s;
}
.gallery-add:active { border-color: var(--accent); color: var(--accent); }

/* ── Section heading ── */
.section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin: 16px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px;
}
.section-hdr h3 {
  font-size: 13px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
}

/* ── Items list (inside box detail) ── */
.item-row {
  background: var(--surface); border: 1px solid var(--border);
  padding: 10px 12px; margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}
.item-row-info { flex: 1; min-width: 0; }
.item-row-name { font-size: 15px; font-weight: 700; }
.item-row-meta { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.item-row-qty {
  font-family: var(--mono); font-size: 16px; font-weight: bold;
  color: var(--accent); flex-shrink: 0;
}

/* ── Table (items panel) ── */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; min-width: 400px; }
th {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td { padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 14px; }
tr:active td { background: var(--surface2); }

/* ── Chips ── */
.chip {
  display: inline-block; font-family: var(--mono); font-size: 11px;
  background: var(--surface2); border: 1px solid var(--border);
  padding: 2px 7px; margin: 2px; color: var(--muted);
}
.chip.cat { color: var(--accent2); border-color: var(--accent2); }

/* ── Room cards ── */
.room-row {
  background: var(--surface); border: 1px solid var(--border);
  padding: 14px 16px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.room-row-name { font-size: 17px; font-weight: 700; flex: 1; }
.room-row-count { font-family: var(--mono); font-size: 12px; color: var(--muted); }

/* ── Modal ── */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.75); z-index: 200;
  align-items: flex-end; justify-content: center;
  padding: 0;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--surface);
  border-top: 3px solid var(--accent);
  width: 100%; max-width: 600px;
  max-height: 90vh; overflow-y: auto;
  padding: 20px 16px;
  padding-bottom: calc(20px + var(--safe-bottom));
  border-radius: 0;
}
@media (min-width: 640px) {
  .modal-backdrop { align-items: center; }
  .modal { border: 1px solid var(--border); border-top: 3px solid var(--accent); max-height: 85vh; }
}
.modal h3 {
  font-size: 18px; font-weight: 900; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 18px;
}
.modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }

/* ── Form fields ── */
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 5px;
}
.field input, .field select, .field textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--sans); font-size: 16px;
  padding: 10px 12px; outline: none; transition: border-color .15s;
  -webkit-appearance: none; border-radius: 0;
}
.field textarea { min-height: 80px; resize: vertical; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field select option { background: var(--bg); }

/* ── Autocomplete ── */
.ac-wrap { position: relative; }
.ac-list {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--surface2); border: 1px solid var(--accent);
  z-index: 300; max-height: 200px; overflow-y: auto; display: none;
}
.ac-list.open { display: block; }
.ac-item {
  padding: 10px 12px; cursor: pointer; font-size: 15px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.ac-item:active { background: var(--border); }
.ac-item small { color: var(--muted); font-family: var(--mono); font-size: 11px; }
.ac-create { color: var(--accent); font-style: italic; }

/* ── Search results ── */
.result-row {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 12px; margin-bottom: 8px;
  cursor: pointer;
}
.result-row:active { background: var(--surface2); }
.result-box { font-family: var(--mono); font-size: 11px; color: var(--accent); margin-bottom: 4px; }
.result-label { font-size: 16px; font-weight: 700; }
.result-items { margin-top: 6px; }

/* ── Print modal ── */
.print-wrap { text-align: center; }
.print-preview {
  background: #fff; color: #000; padding: 16px;
  display: inline-block; border: 2px dashed var(--border);
  text-align: center;
}
.print-qr { display: inline-block; border: 4px solid #000; padding: 8px; background: #fff; margin-bottom: 8px; }
.print-num { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 900; color: #000; line-height: 1; }
.print-label { font-size: 16px; font-weight: 700; color: #333; max-width: 200px; word-break: break-word; margin: 0 auto; }

@media print {
  body * { visibility: hidden; }
  .print-preview, .print-preview * { visibility: visible; }
  .print-preview { position: fixed; top: 0; left: 0; border: none; padding: 8px; }
}

/* ── Misc ── */
.empty { color: var(--muted); font-family: var(--mono); font-size: 13px; padding: 40px 16px; text-align: center; }
.badge { font-family: var(--mono); font-size: 11px; background: var(--surface2); border: 1px solid var(--border); padding: 1px 6px; color: var(--muted); }
.hidden { display: none !important; }
.img-upload-input { display: none; }


/* ── Tablet (640px+): better modals, slightly larger gallery ── */
@media (min-width: 640px) {
  .modal-backdrop { padding: 20px; }
  .modal { border-radius: 0; }
  .panel { padding: 20px 24px; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .gallery-item, .gallery-add { width: 100px; height: 100px; }
  .ac-item:hover { background: var(--border); }
  tr:hover td { background: var(--surface2); }
  .card:hover { border-color: var(--accent); }
  .result-row:hover { background: var(--surface2); }
  .room-row:hover { background: var(--surface2); }
}

/* ── Desktop (900px+): sidebar nav replaces bottom tab bar ── */
@media (min-width: 900px) {
  /* Show sidebar, hide bottom tabs */
  .tabbar { display: none; }
  .sidebar {
    display: flex !important;
    flex-direction: column;
    position: fixed;
    top: var(--nav-h); bottom: 0; left: 0;
    width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    z-index: 50;
  }
  .sidebar button {
    display: block; width: 100%; text-align: left;
    background: none; border: none; border-left: 3px solid transparent;
    color: var(--muted); font-family: var(--sans); font-size: 15px;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    padding: 11px 20px; cursor: pointer; transition: all .15s;
  }
  .sidebar button:hover { color: var(--text); background: var(--surface2); }
  .sidebar button.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }

  /* Push content right of sidebar, remove bottom offset */
  .content {
    left: 200px;
    bottom: 0;
  }

  /* Wider topbar search */
  .topbar .search-box { max-width: 480px; }

  /* Bigger card grid with more columns */
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  /* Larger gallery thumbnails */
  .gallery-item, .gallery-add { width: 120px; height: 120px; }

  /* Constrain detail views so they don't stretch too wide */
  .detail { max-width: 860px; }

  /* Panel padding */
  .panel { padding: 28px 32px; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>BOX<span>TRACK</span></h1>
  <input class="search-box" id="globalSearch" type="search" placeholder="🔍 Search…" oninput="handleSearch(this.value)">
</div>


<!-- Sidebar nav (desktop only, hidden on mobile via CSS) -->
<nav class="sidebar" style="display:none;">
  <button id="sidebar-boxes" class="active" onclick="showPanel('boxes')">📦 Boxes</button>
  <button id="sidebar-rooms" onclick="showPanel('rooms')">🏠 Rooms</button>
  <button id="sidebar-items" onclick="showPanel('items')">📋 Items</button>
</nav>

<div class="content" id="mainContent">

  <!-- BOXES -->
  <div id="panel-boxes" class="panel active">
    <div class="panel-hdr">
      <h2>Boxes</h2>
      <button class="btn btn-primary btn-sm" onclick="openBoxModal()">+ New</button>
    </div>
    <div style="margin-bottom:12px;">
      <select id="roomFilter" onchange="loadBoxes()"
        style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:14px;padding:8px 10px;width:100%;max-width:260px;-webkit-appearance:none;border-radius:0;">
        <option value="">All Rooms</option>
      </select>
    </div>
    <div id="boxes-grid" class="card-grid"></div>
  </div>

  <!-- BOX DETAIL -->
  <div id="panel-box-detail" class="panel">
    <div id="box-detail-content"></div>
  </div>

  <!-- ROOMS -->
  <div id="panel-rooms" class="panel">
    <div class="panel-hdr">
      <h2>Rooms</h2>
      <button class="btn btn-primary btn-sm" onclick="openRoomModal()">+ Add</button>
    </div>
    <div id="rooms-list"></div>
  </div>

  <!-- ITEMS -->
  <div id="panel-items" class="panel">
    <div class="panel-hdr">
      <h2>Items</h2>
      <button class="btn btn-primary btn-sm" onclick="openItemModal()">+ Add</button>
    </div>
    <div style="margin-bottom:12px;">
      <input id="itemSearch" type="search" placeholder="Filter…"
        oninput="filterItems(this.value)"
        style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:14px;padding:8px 10px;width:100%;max-width:280px;outline:none;-webkit-appearance:none;border-radius:0;">
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Name</th><th>Category</th><th>Boxes</th><th></th></tr></thead>
        <tbody id="items-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- SEARCH RESULTS -->
  <div id="panel-search" class="panel">
    <div class="panel-hdr"><h2>Search</h2></div>
    <div id="search-results"></div>
  </div>

</div>

<!-- Bottom tab bar -->
<div class="tabbar">
  <button class="active" id="tab-boxes" onclick="showPanel('boxes')">
    <span class="icon">📦</span>Boxes
  </button>
  <button id="tab-rooms" onclick="showPanel('rooms')">
    <span class="icon">🏠</span>Rooms
  </button>
  <button id="tab-items" onclick="showPanel('items')">
    <span class="icon">📋</span>Items
  </button>
</div>

<!-- ══ MODALS ══════════════════════════════════════════════════════════════ -->

<!-- Box modal -->
<div id="modal-box" class="modal-backdrop">
  <div class="modal">
    <h3 id="modal-box-title">New Box</h3>
    <div class="field">
      <label>Label / Short Name (optional)</label>
      <input type="text" id="box-label" placeholder="e.g. Kitchen Essentials">
    </div>
    <div class="field">
      <label>Description (optional)</label>
      <textarea id="box-description" placeholder="e.g. Contains everyday cooking items, spices, and small appliances"></textarea>
    </div>
    <div class="field">
      <label>Room</label>
      <select id="box-room"><option value="">— No Room —</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-box')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveBox()">Save</button>
    </div>
  </div>
</div>

<!-- Room modal -->
<div id="modal-room" class="modal-backdrop">
  <div class="modal">
    <h3 id="modal-room-title">Add Room</h3>
    <div class="field">
      <label>Room Name</label>
      <input type="text" id="room-name" placeholder="e.g. Living Room">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-room')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveRoom()">Save</button>
    </div>
  </div>
</div>

<!-- Item modal -->
<div id="modal-item" class="modal-backdrop">
  <div class="modal">
    <h3 id="modal-item-title">Add Item</h3>
    <div class="field">
      <label>Item Name</label>
      <input type="text" id="item-name" placeholder="e.g. Rice Cooker">
    </div>
    <div class="field">
      <label>Category</label>
      <div class="ac-wrap">
        <input type="text" id="item-category" placeholder="e.g. Kitchen"
          oninput="searchCategories(this.value, 'cat-suggestions')" autocomplete="off">
        <div id="cat-suggestions" class="ac-list"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-item')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- Add item to box modal -->
<div id="modal-atb" class="modal-backdrop">
  <div class="modal">
    <h3>Add Item to Box</h3>

    <div class="field">
      <label>Item</label>
      <div class="ac-wrap">
        <input type="text" id="atb-search" placeholder="Search or type new item name…"
          oninput="searchItemsAC(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
        <div id="atb-suggestions" class="ac-list"></div>
        <input type="hidden" id="atb-item-id">
      </div>
      <!-- Shows which existing item is selected -->
      <div id="atb-selected-badge" style="display:none;margin-top:6px;padding:6px 10px;background:var(--surface2);border:1px solid var(--accent);font-family:var(--mono);font-size:12px;color:var(--accent);align-items:center;gap:8px;">
        <span id="atb-selected-name"></span>
        <button onclick="clearATBItem()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;margin-left:auto;">✕ change</button>
      </div>
    </div>

    <div class="field" id="atb-category-field">
      <label>Category <span style="color:var(--muted);font-size:11px;">(new items only)</span></label>
      <div class="ac-wrap">
        <input type="text" id="atb-category" placeholder="e.g. Kitchen"
          oninput="searchCategories(this.value, 'atb-cat-suggestions')" autocomplete="off">
        <div id="atb-cat-suggestions" class="ac-list"></div>
      </div>
    </div>

    <div class="field">
      <label>Quantity</label>
      <input type="number" id="atb-qty" value="1" min="1">
    </div>

    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="atb-notes" placeholder="e.g. cables in side pocket">
    </div>

    <div class="field">
      <label>Photo (optional)</label>
      <div id="atb-photo-preview" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;"></div>
      <button type="button" class="btn btn-secondary btn-sm" onclick="triggerATBPhoto()">📷 Add Photo</button>
      <input type="file" id="atb-photo-input" accept="image/*" multiple style="display:none"
        onchange="handleATBPhotoSelect(this)">
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-atb')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="confirmAddToBox()">Add to Box</button>
    </div>
  </div>
</div>

<!-- Print modal -->
<div id="modal-print" class="modal-backdrop">
  <div class="modal print-wrap">
    <h3>Print Label</h3>
    <div class="print-preview" id="print-target">
      <div class="print-qr" id="qr-container"></div>
      <div class="print-num" id="print-box-num"></div>
      <div class="print-label" id="print-box-label"></div>
    </div>
    <div class="modal-actions" style="justify-content:center;margin-top:14px;">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-print')">Close</button>
      <button class="btn btn-primary btn-sm" onclick="window.print()">🖨 Print</button>
    </div>
  </div>
</div>

<!-- Hidden file input for image uploads -->
<input type="file" id="img-input" class="img-upload-input"
  accept="image/*" capture="environment" multiple
  onchange="handleImageUpload(this)">

<script>
// ── State ──────────────────────────────────────────────────────────────────
let rooms = [];
let allItems = [];
let editingBox = null;
let editingRoom = null;
let editingItem = null;
let currentBoxId = null;
let addToBoxId = null;
let uploadTarget = null; // { entity_type, entity_id, refresh }
let searchTimer = null;

// ── API ────────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: opts.body && !(opts.body instanceof FormData)
      ? { 'Content-Type': 'application/json' } : {},
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, isErr = false) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'calc(var(--tab-h) + var(--safe-bottom) + 12px)',
    left:'50%', transform:'translateX(-50%)', zIndex:'999',
    padding:'10px 18px',
    background: isErr ? 'var(--danger)' : 'var(--accent)',
    color:'#000', fontFamily:'var(--sans)', fontWeight:'700',
    fontSize:'14px', letterSpacing:'1px',
    boxShadow:'0 4px 20px rgba(0,0,0,.4)',
    whiteSpace:'nowrap', maxWidth:'90vw', overflow:'hidden', textOverflow:'ellipsis',
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ── Navigation ─────────────────────────────────────────────────────────────
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  // Deactivate both nav types
  document.querySelectorAll('.tabbar button, .sidebar button').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  // Activate bottom tab
  const tab = document.getElementById(`tab-${name}`);
  if (tab) tab.classList.add('active');
  // Activate sidebar button
  const sideBtn = document.getElementById(`sidebar-${name}`);
  if (sideBtn) sideBtn.classList.add('active');
  document.getElementById('mainContent').scrollTop = 0;

  if (name === 'boxes') loadBoxes();
  else if (name === 'rooms') loadRooms();
  else if (name === 'items') loadItems();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-backdrop').forEach(bd => {
  bd.addEventListener('click', e => { if (e.target === bd) bd.classList.remove('open'); });
});

// ── Rooms ──────────────────────────────────────────────────────────────────
async function loadRooms() {
  rooms = await api('/api/rooms');
  // Update filter
  const f = document.getElementById('roomFilter');
  const prev = f.value;
  f.innerHTML = '<option value="">All Rooms</option>' +
    rooms.map(r => `<option value="${r.id}" ${prev==r.id?'selected':''}>${esc(r.name)}</option>`).join('');
  // Rooms panel
  const list = document.getElementById('rooms-list');
  if (!rooms.length) { list.innerHTML = '<div class="empty">No rooms yet.</div>'; return; }
  list.innerHTML = rooms.map(r => `
    <div class="room-row">
      <div class="room-row-name">${esc(r.name)}</div>
      <div class="room-row-count">${r.box_count} box${r.box_count!=1?'es':''}</div>
      <button class="btn-icon" onclick="openRoomModal(${r.id})">✏️</button>
      <button class="btn-icon danger" onclick="deleteRoom(${r.id})">🗑</button>
    </div>
  `).join('');
}

function openRoomModal(id = null) {
  editingRoom = id;
  document.getElementById('modal-room-title').textContent = id ? 'Edit Room' : 'Add Room';
  const r = id ? rooms.find(x => x.id === id) : null;
  document.getElementById('room-name').value = r ? r.name : '';
  openModal('modal-room');
}

async function saveRoom() {
  const name = document.getElementById('room-name').value.trim();
  if (!name) { toast('Room name required', true); return; }
  try {
    if (editingRoom)
      await api(`/api/rooms/${editingRoom}`, { method:'PUT', body:JSON.stringify({name}) });
    else
      await api('/api/rooms', { method:'POST', body:JSON.stringify({name}) });
    closeModal('modal-room');
    await loadRooms();
    toast(editingRoom ? 'Room updated' : 'Room added');
  } catch(e) { toast(e.message, true); }
}

async function deleteRoom(id) {
  if (!confirm('Delete room? Boxes will become unassigned.')) return;
  await api(`/api/rooms/${id}`, { method:'DELETE' });
  await loadRooms();
  toast('Room deleted');
}

// ── Boxes ──────────────────────────────────────────────────────────────────
async function loadBoxes() {
  await loadRooms();
  const roomId = document.getElementById('roomFilter').value;
  const url = roomId ? `/api/boxes?room_id=${roomId}` : '/api/boxes';
  const boxes = await api(url);
  const grid = document.getElementById('boxes-grid');
  if (!boxes.length) {
    grid.innerHTML = '<div class="empty">No boxes yet. Tap + New to create one.</div>'; return;
  }
  grid.innerHTML = boxes.map(b => `
    <div class="card" onclick="openBoxDetail(${b.id})">
      <div class="card-thumb">
        ${b.thumb_url
          ? `<img src="${b.thumb_url}" alt="box photo" loading="lazy">`
          : `<span>📦</span>`}
      </div>
      <div class="card-body">
        <div class="card-num">BOX ${b.box_number}</div>
        <div class="card-title">${esc(b.label || 'Unlabelled')}</div>
        <div class="card-meta">${b.room_name ? `📍 ${esc(b.room_name)}` : 'No room'} · ${b.item_count} type${b.item_count!=1?'s':''}</div>
        ${b.description ? `<div class="card-desc">${esc(b.description.substring(0,80))}${b.description.length>80?'…':''}</div>` : ''}
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-sm btn-secondary" onclick="openBoxModal(${b.id})">Edit</button>
          <button class="btn btn-sm btn-primary" onclick="openPrintModal(${b.id})">🖨</button>
          <button class="btn btn-sm btn-danger" onclick="deleteBox(${b.id})">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openBoxModal(id = null) {
  editingBox = id;
  document.getElementById('modal-box-title').textContent = id ? 'Edit Box' : 'New Box';
  const sel = document.getElementById('box-room');
  sel.innerHTML = '<option value="">— No Room —</option>' +
    rooms.map(r => `<option value="${r.id}">${esc(r.name)}</option>`).join('');
  if (id) {
    api(`/api/boxes/${id}`).then(b => {
      document.getElementById('box-label').value = b.label || '';
      document.getElementById('box-description').value = b.description || '';
      sel.value = b.room_id || '';
    });
  } else {
    document.getElementById('box-label').value = '';
    document.getElementById('box-description').value = '';
    sel.value = '';
  }
  openModal('modal-box');
}

async function saveBox() {
  const label = document.getElementById('box-label').value.trim();
  const description = document.getElementById('box-description').value.trim();
  const room_id = document.getElementById('box-room').value || null;
  try {
    if (editingBox) {
      await api(`/api/boxes/${editingBox}`, { method:'PUT', body:JSON.stringify({label, description, room_id}) });
      closeModal('modal-box');
      toast('Box updated');
      openBoxDetail(editingBox);
    } else {
      const box = await api('/api/boxes', { method:'POST', body:JSON.stringify({label, description, room_id}) });
      closeModal('modal-box');
      toast(`Box #${box.box_number} created`);
      loadBoxes();
    }
  } catch(e) { toast(e.message, true); }
}

async function deleteBox(id) {
  if (!confirm('Delete this box and all its contents?')) return;
  await api(`/api/boxes/${id}`, { method:'DELETE' });
  toast('Box deleted');
  showPanel('boxes');
}

// ── Box Detail ─────────────────────────────────────────────────────────────
async function openBoxDetail(id) {
  currentBoxId = id;
  const box = await api(`/api/boxes/${id}`);

  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tabbar button, .sidebar button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-box-detail').classList.add('active');
  // Keep "Boxes" highlighted in nav while viewing a box
  const tb = document.getElementById('tab-boxes');
  if (tb) tb.classList.add('active');
  const sb = document.getElementById('sidebar-boxes');
  if (sb) sb.classList.add('active');
  document.getElementById('mainContent').scrollTop = 0;

  const itemsHtml = box.items.length
    ? box.items.map(i => `
        <div class="item-row">
          <div class="item-row-info">
            <div class="item-row-name">${esc(i.name)}</div>
            <div class="item-row-meta">
              ${i.category ? `<span class="chip cat">${esc(i.category)}</span>` : ''}
              ${i.notes ? `· ${esc(i.notes)}` : ''}
            </div>
          </div>
          <div class="item-row-qty">×${i.quantity}</div>
          <button class="btn-icon" onclick="editBoxItem(${i.box_item_id}, ${i.quantity}, ${JSON.stringify(i.notes||'')})">✏️</button>
          <button class="btn-icon danger" onclick="removeBoxItem(${i.box_item_id})">🗑</button>
        </div>
      `).join('')
    : '<div class="empty">No items yet.</div>';

  const imagesHtml = renderGallery(box.images, 'box', box.id);

  document.getElementById('box-detail-content').innerHTML = `
    <div class="detail">
      <div class="detail-back">
        <button class="btn btn-secondary btn-sm" onclick="showPanel('boxes')">← Back</button>
      </div>
      <div class="detail-hdr">
        <div class="detail-num">${box.box_number}</div>
        <div style="flex:1;min-width:0;">
          <div class="detail-title">${esc(box.label || 'Unlabelled Box')}</div>
          <div class="detail-room">📍 ${esc(box.room_name || 'No room assigned')}</div>
          ${box.description ? `<div class="detail-desc">${esc(box.description)}</div>` : ''}
        </div>
        <div class="detail-actions">
          <button class="btn btn-secondary btn-sm" onclick="openBoxModal(${box.id})">Edit</button>
          <button class="btn btn-primary btn-sm" onclick="openPrintModal(${box.id})">🖨</button>
        </div>
      </div>

      <div class="section-hdr">
        <h3>Photos</h3>
        <button class="btn btn-secondary btn-sm" onclick="triggerImageUpload('box',${box.id},()=>openBoxDetail(${box.id}))">+ Photo</button>
      </div>
      <div id="gallery-box-${box.id}" class="gallery">${imagesHtml}</div>

      <div class="section-hdr">
        <h3>Contents (${box.items.length})</h3>
        <button class="btn btn-primary btn-sm" onclick="openAddToBoxModal(${box.id})">+ Item</button>
      </div>
      <div id="box-items-list">${itemsHtml}</div>
    </div>
  `;
}

function renderGallery(images, entityType, entityId) {
  return images.map(img => `
    <div class="gallery-item" id="img-${img.id}">
      <img src="${img.url}" loading="lazy" onclick="viewImage('${img.url}')">
      <button class="del-img" onclick="deleteImage(${img.id},'${entityType}',${entityId})">✕</button>
    </div>
  `).join('');
}

async function removeBoxItem(boxItemId) {
  if (!confirm('Remove this item from the box?')) return;
  await api(`/api/box-items/${boxItemId}`, { method:'DELETE' });
  toast('Item removed');
  openBoxDetail(currentBoxId);
}

async function editBoxItem(boxItemId, currentQty, currentNotes) {
  const qty = prompt('Quantity:', currentQty);
  if (qty === null) return;
  const notes = prompt('Notes:', currentNotes);
  await api(`/api/box-items/${boxItemId}`, {
    method:'PUT',
    body: JSON.stringify({ quantity: parseInt(qty)||1, notes })
  });
  toast('Updated');
  openBoxDetail(currentBoxId);
}

// ── Add Item to Box ────────────────────────────────────────────────────────
let atbPendingPhotos = []; // File objects staged before the item is saved

function openAddToBoxModal(boxId) {
  addToBoxId = boxId;
  atbPendingPhotos = [];
  document.getElementById('atb-search').value = '';
  document.getElementById('atb-item-id').value = '';
  document.getElementById('atb-category').value = '';
  document.getElementById('atb-qty').value = '1';
  document.getElementById('atb-notes').value = '';
  document.getElementById('atb-photo-preview').innerHTML = '';
  document.getElementById('atb-photo-input').value = '';
  document.getElementById('atb-suggestions').classList.remove('open');
  document.getElementById('atb-cat-suggestions').classList.remove('open');
  setATBSelection(null, null, null); // reset selected-item badge
  openModal('modal-atb');
}

// Show/hide the "selected item" badge and category field
function setATBSelection(id, name, cat) {
  const badge = document.getElementById('atb-selected-badge');
  const catField = document.getElementById('atb-category-field');
  const searchInput = document.getElementById('atb-search');
  if (id) {
    document.getElementById('atb-item-id').value = id;
    document.getElementById('atb-selected-name').textContent = name + (cat ? ' · ' + cat : '');
    badge.style.display = 'flex';
    searchInput.style.display = 'none';
    catField.style.display = 'none'; // category already set on existing item
  } else {
    document.getElementById('atb-item-id').value = '';
    badge.style.display = 'none';
    searchInput.style.display = '';
    catField.style.display = '';
  }
}

function clearATBItem() {
  setATBSelection(null, null, null);
  const inp = document.getElementById('atb-search');
  inp.value = '';
  inp.focus();
}

async function searchItemsAC(q) {
  // Don't search if an item is already selected (input is hidden, but just in case)
  if (document.getElementById('atb-item-id').value) return;
  const list = document.getElementById('atb-suggestions');
  if (!q.trim()) { list.classList.remove('open'); return; }
  const items = await api(`/api/items?q=${encodeURIComponent(q)}`);
  // Use mousedown instead of click so it fires before the input's blur event
  const rows = items.map(i => `
    <div class="ac-item" onmousedown="event.preventDefault()" onclick="selectATBItem(${i.id}, ${JSON.stringify(i.name)}, ${JSON.stringify(i.category||'')})">
      <span>${esc(i.name)}</span>
      <small>${esc(i.category||'')}</small>
    </div>
  `).join('');
  const createRow = `<div class="ac-item ac-create" onmousedown="event.preventDefault()" onclick="useATBNewItem()">+ Create "<span id="atb-create-label">${esc(q)}</span>"</div>`;
  list.innerHTML = rows + createRow;
  list.classList.add('open');
}

function selectATBItem(id, name, cat) {
  document.getElementById('atb-suggestions').classList.remove('open');
  setATBSelection(id, name, cat);
}

function useATBNewItem() {
  // Keep the typed text as the item name, don't select an existing item
  document.getElementById('atb-item-id').value = '';
  document.getElementById('atb-suggestions').classList.remove('open');
}

// Photo handling for the ATB modal
function triggerATBPhoto() {
  const inp = document.getElementById('atb-photo-input');
  inp.value = '';
  inp.click();
}

function handleATBPhotoSelect(input) {
  const preview = document.getElementById('atb-photo-preview');
  for (const file of input.files) {
    atbPendingPhotos.push(file);
    const url = URL.createObjectURL(file);
    const idx = atbPendingPhotos.length - 1;
    const div = document.createElement('div');
    div.className = 'gallery-item';
    div.id = `atb-pending-${idx}`;
    div.innerHTML = `<img src="${url}"><button class="del-img" onclick="removeATBPhoto(${idx})">✕</button>`;
    preview.appendChild(div);
  }
}

function removeATBPhoto(idx) {
  atbPendingPhotos[idx] = null; // null = removed
  const el = document.getElementById(`atb-pending-${idx}`);
  if (el) el.remove();
}

async function uploadPendingPhotos(itemId) {
  for (const file of atbPendingPhotos) {
    if (!file) continue;
    const fd = new FormData();
    fd.append('file', file);
    fd.append('entity_type', 'item');
    fd.append('entity_id', itemId);
    try {
      await fetch('/api/images/upload', { method: 'POST', body: fd });
    } catch(e) {
      toast(`Photo upload failed: ${e.message}`, true);
    }
  }
}

async function confirmAddToBox() {
  let item_id = document.getElementById('atb-item-id').value;
  const qty = parseInt(document.getElementById('atb-qty').value) || 1;
  const notes = document.getElementById('atb-notes').value.trim();
  const category = document.getElementById('atb-category').value.trim();

  if (!item_id) {
    // Creating a new item
    const name = document.getElementById('atb-search').value.trim();
    if (!name) { toast('Enter an item name', true); return; }
    const newItem = await api('/api/items', { method:'POST', body:JSON.stringify({name, category}) });
    item_id = newItem.id;
  }

  // Upload any staged photos against the item
  const photoCount = atbPendingPhotos.filter(Boolean).length;
  if (photoCount > 0) {
    await uploadPendingPhotos(item_id);
  }

  await api(`/api/boxes/${addToBoxId}/items`, {
    method:'POST', body:JSON.stringify({ item_id, quantity:qty, notes })
  });
  closeModal('modal-atb');
  toast(`Item added${photoCount > 0 ? ` with ${photoCount} photo${photoCount>1?'s':''}` : ''}`);
  openBoxDetail(addToBoxId);
}

// ── Items ──────────────────────────────────────────────────────────────────
async function loadItems() {
  allItems = await api('/api/items');
  renderItems(allItems);
}

function renderItems(items) {
  const tbody = document.getElementById('items-tbody');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">No items yet.</td></tr>'; return;
  }
  tbody.innerHTML = items.map(i => `
    <tr>
      <td>${esc(i.name)}</td>
      <td><span class="chip cat">${esc(i.category||'—')}</span></td>
      <td class="mono" style="font-family:var(--mono);font-size:12px;">
        ${i.in_boxes ? i.in_boxes.split(',').map(n=>`<span class="badge">#${n}</span>`).join('') : '<span style="color:var(--muted)">—</span>'}
      </td>
      <td>
        <button class="btn-icon" onclick="openItemModal(${i.id})">✏️</button>
        <button class="btn-icon danger" onclick="deleteItem(${i.id})">🗑</button>
      </td>
    </tr>
  `).join('');
}

function filterItems(q) {
  if (!q) { renderItems(allItems); return; }
  const lq = q.toLowerCase();
  renderItems(allItems.filter(i =>
    i.name.toLowerCase().includes(lq) || (i.category||'').toLowerCase().includes(lq)
  ));
}

function openItemModal(id = null) {
  editingItem = id;
  document.getElementById('modal-item-title').textContent = id ? 'Edit Item' : 'Add Item';
  const item = id ? allItems.find(x => x.id === id) : null;
  document.getElementById('item-name').value = item ? item.name : '';
  document.getElementById('item-category').value = item ? (item.category||'') : '';
  document.getElementById('cat-suggestions').classList.remove('open');
  openModal('modal-item');
}

async function saveItem() {
  const name = document.getElementById('item-name').value.trim();
  const category = document.getElementById('item-category').value.trim();
  if (!name) { toast('Item name required', true); return; }
  try {
    if (editingItem)
      await api(`/api/items/${editingItem}`, { method:'PUT', body:JSON.stringify({name, category}) });
    else
      await api('/api/items', { method:'POST', body:JSON.stringify({name, category}) });
    closeModal('modal-item');
    toast(editingItem ? 'Item updated' : 'Item added');
    await loadItems();
  } catch(e) { toast(e.message, true); }
}

async function deleteItem(id) {
  if (!confirm('Delete this item? It will be removed from all boxes.')) return;
  await api(`/api/items/${id}`, { method:'DELETE' });
  toast('Item deleted');
  await loadItems();
}

// ── Category autocomplete ──────────────────────────────────────────────────
async function searchCategories(q, listId) {
  const list = document.getElementById(listId);
  if (!q.trim()) { list.classList.remove('open'); return; }
  const cats = await api(`/api/categories?q=${encodeURIComponent(q)}`);
  const matches = cats.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
  const exact = matches.some(c => c.name.toLowerCase() === q.toLowerCase());
  let html = matches.map(c =>
    `<div class="ac-item" onclick="selectCategory('${esc(c.name)}','${listId}')">${esc(c.name)}</div>`
  ).join('');
  if (!exact && q.trim())
    html += `<div class="ac-item ac-create" onclick="selectCategory('${esc(q)}','${listId}')">+ Create "${esc(q)}"</div>`;
  if (!html) { list.classList.remove('open'); return; }
  list.innerHTML = html;
  list.classList.add('open');
}

function selectCategory(name, listId) {
  // Find the input associated with this suggestion list
  const list = document.getElementById(listId);
  const input = list.previousElementSibling;
  input.value = name;
  list.classList.remove('open');
}

// ── Images ─────────────────────────────────────────────────────────────────
function triggerImageUpload(entityType, entityId, refreshFn) {
  uploadTarget = { entityType, entityId, refreshFn };
  const inp = document.getElementById('img-input');
  inp.value = '';
  inp.click();
}

async function handleImageUpload(input) {
  if (!uploadTarget || !input.files.length) return;
  const { entityType, entityId, refreshFn } = uploadTarget;
  let uploaded = 0;
  for (const file of input.files) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('entity_type', entityType);
    fd.append('entity_id', entityId);
    try {
      await fetch('/api/images/upload', { method:'POST', body:fd });
      uploaded++;
    } catch(e) {
      toast(`Failed to upload ${file.name}`, true);
    }
  }
  if (uploaded) {
    toast(`${uploaded} photo${uploaded>1?'s':''} uploaded`);
    refreshFn();
  }
}

async function deleteImage(imageId, entityType, entityId) {
  if (!confirm('Delete this photo?')) return;
  await api(`/api/images/${imageId}`, { method:'DELETE' });
  toast('Photo deleted');
  if (entityType === 'box') openBoxDetail(entityId);
}

function viewImage(url) {
  const overlay = document.createElement('div');
  Object.assign(overlay.style, {
    position:'fixed', inset:'0', background:'rgba(0,0,0,.92)',
    zIndex:'500', display:'flex', alignItems:'center', justifyContent:'center',
    cursor:'pointer',
  });
  overlay.innerHTML = `<img src="${url}" style="max-width:95vw;max-height:90vh;object-fit:contain;">`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

// ── Print / QR ─────────────────────────────────────────────────────────────
async function openPrintModal(boxId) {
  const box = await api(`/api/boxes/${boxId}`);
  const qrEl = document.getElementById('qr-container');
  qrEl.innerHTML = '';
  new QRCode(qrEl, {
    text: `${location.origin}/?box=${box.box_number}`,
    width: 150, height: 150,
    correctLevel: QRCode.CorrectLevel.M
  });
  document.getElementById('print-box-num').textContent = `BOX ${box.box_number}`;
  document.getElementById('print-box-label').textContent = box.label || box.room_name || '';
  openModal('modal-print');
}

// ── Global Search ──────────────────────────────────────────────────────────
function handleSearch(q) {
  clearTimeout(searchTimer);
  if (!q.trim()) { showPanel('boxes'); return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
}

async function doSearch(q) {
  const results = await api(`/api/search?q=${encodeURIComponent(q)}`);
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tabbar button, .sidebar button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-search').classList.add('active');
  document.getElementById('mainContent').scrollTop = 0;

  const div = document.getElementById('search-results');
  if (!results.length) { div.innerHTML = '<div class="empty">No results.</div>'; return; }

  const byBox = {};
  results.forEach(r => {
    if (!byBox[r.box_id]) byBox[r.box_id] = { ...r, matches:[] };
    byBox[r.box_id].matches.push(r);
  });

  div.innerHTML = Object.values(byBox).map(b => `
    <div class="result-row" onclick="openBoxDetail(${b.box_id})">
      <div class="result-box">BOX ${b.box_number} · 📍 ${esc(b.room_name||'No room')}</div>
      <div class="result-label">${esc(b.label||'Unlabelled')}</div>
      <div class="result-items">
        ${b.matches.map(m=>`<span class="chip">${esc(m.item_name)} ×${m.quantity}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

// Close autocomplete lists on outside tap
document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap'))
    document.querySelectorAll('.ac-list').forEach(l => l.classList.remove('open'));
});

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  await loadRooms();
  loadBoxes();
})();
</script>
