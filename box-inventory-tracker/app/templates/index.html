<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>BoxTrack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222533;
  --border: #2e3349;
  --accent: #f5a623;
  --accent2: #e8f54a;
  --danger: #e84a4a;
  --text: #d4d8e8;
  --muted: #6b7280;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Barlow Condensed', sans-serif;
  --nav-h: 56px;
  --tab-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
}

/* ── Top bar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--surface);
  border-bottom: 2px solid var(--accent);
  display: flex; align-items: center; gap: 10px; padding: 0 12px;
}
.topbar h1 {
  font-family: var(--sans); font-weight: 900; font-size: 20px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  white-space: nowrap;
}
.topbar h1 span { color: var(--text); }
.topbar .search-box {
  flex: 1; min-width: 0;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 13px;
  padding: 7px 10px; outline: none; transition: border-color .15s;
  max-width: 360px; margin-left: auto;
}
.topbar .search-box:focus { border-color: var(--accent); }
.topbar .search-box::placeholder { color: var(--muted); }

/* ── Bottom tab bar (mobile nav) ── */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
}
.tabbar button {
  flex: 1; background: none; border: none; color: var(--muted);
  font-family: var(--sans); font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; cursor: pointer;
  transition: color .15s; padding: 0;
  border-top: 2px solid transparent;
}
.tabbar button .icon { font-size: 20px; line-height: 1; }
.tabbar button.active { color: var(--accent); border-top-color: var(--accent); }

/* ── Scrollable content area ── */
.content {
  position: fixed;
  top: var(--nav-h);
  bottom: calc(var(--tab-h) + var(--safe-bottom));
  left: 0; right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── Panels ── */
.panel { display: none; padding: 16px; min-height: 100%; }
.panel.active { display: block; }

.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.panel-hdr h2 {
  font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
}

/* ── Buttons ── */
.btn {
  font-family: var(--sans); font-weight: 700; font-size: 14px;
  letter-spacing: 1.5px; text-transform: uppercase;
  border: none; padding: 10px 16px; cursor: pointer;
  transition: all .15s; white-space: nowrap; display: inline-flex;
  align-items: center; gap: 6px; touch-action: manipulation;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:active { background: #ffbe4a; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:active { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.btn-icon {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 18px; padding: 6px; transition: color .15s;
  touch-action: manipulation;
}
.btn-icon:active { color: var(--accent); }
.btn-icon.danger:active { color: var(--danger); }

/* ── Cards ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  transition: border-color .15s;
  overflow: hidden;
}
.card:active { border-color: var(--accent); }

.card-thumb {
  width: 100%; aspect-ratio: 16/9; object-fit: cover;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  color: var(--border); font-size: 32px;
}
.card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

.card-body { padding: 12px; }
.card-num {
  font-family: var(--mono); font-size: 11px;
  background: var(--accent); color: #000; padding: 1px 6px;
  display: inline-block; margin-bottom: 6px;
}
.card-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.card-meta { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.card-desc { font-size: 14px; color: var(--muted); margin-top: 4px; }
.card-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

/* ── Detail view ── */
.detail { max-width: 700px; }
.detail-back { margin-bottom: 14px; }
.detail-hdr {
  display: flex; align-items: flex-start; gap: 14px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.detail-num {
  font-family: var(--mono); font-size: 40px; font-weight: bold;
  color: var(--accent); line-height: 1; flex-shrink: 0;
}
.detail-num::before { content: '#'; font-size: 20px; vertical-align: top; margin-top: 3px; display: inline-block; }
.detail-title { font-size: 22px; font-weight: 900; }
.detail-room { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 3px; }
.detail-desc { font-size: 15px; color: var(--text); margin-top: 6px; line-height: 1.5; }
.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }

/* ── Image gallery ── */
.gallery { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
.gallery-item {
  position: relative; width: 80px; height: 80px;
  flex-shrink: 0;
}
.gallery-item img {
  width: 100%; height: 100%; object-fit: cover;
  border: 1px solid var(--border); display: block;
}
.gallery-item .del-img {
  position: absolute; top: 2px; right: 2px;
  background: rgba(0,0,0,.7); border: none; color: #fff;
  font-size: 12px; cursor: pointer; padding: 2px 4px; line-height: 1;
}
.gallery-add {
  width: 80px; height: 80px; flex-shrink: 0;
  background: var(--surface2); border: 1px dashed var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--muted); cursor: pointer;
  transition: border-color .15s;
}
.gallery-add:active { border-color: var(--accent); color: var(--accent); }

/* ── Section heading ── */
.section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin: 16px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px;
}
.section-hdr h3 {
  font-size: 13px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
}

/* ── Items list (inside box detail) ── */
.item-row {
  background: var(--surface); border: 1px solid var(--border);
  padding: 10px 12px; margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}
.item-row-info { flex: 1; min-width: 0; }
.item-row-name { font-size: 15px; font-weight: 700; }
.item-row-meta { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.item-row-qty {
  font-family: var(--mono); font-size: 16px; font-weight: bold;
  color: var(--accent); flex-shrink: 0;
}

/* ── Table (items panel) ── */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; min-width: 400px; }
th {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td { padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 14px; }
tr:active td { background: var(--surface2); }

/* ── Chips ── */
.chip {
  display: inline-block; font-family: var(--mono); font-size: 11px;
  background: var(--surface2); border: 1px solid var(--border);
  padding: 2px 7px; margin: 2px; color: var(--muted);
}
.chip.cat { color: var(--accent2); border-color: var(--accent2); }

/* ── Room cards ── */
.room-row {
  background: var(--surface); border: 1px solid var(--border);
  padding: 14px 16px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.room-row-name { font-size: 17px; font-weight: 700; flex: 1; }
.room-row-count { font-family: var(--mono); font-size: 12px; color: var(--muted); }

/* ── Modal ── */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.75); z-index: 200;
  align-items: flex-end; justify-content: center;
  padding: 0;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--surface);
  border-top: 3px solid var(--accent);
  width: 100%; max-width: 600px;
  max-height: 90vh; overflow-y: auto;
  padding: 20px 16px;
  padding-bottom: calc(20px + var(--safe-bottom));
  border-radius: 0;
}
@media (min-width: 640px) {
  .modal-backdrop { align-items: center; }
  .modal { border: 1px solid var(--border); border-top: 3px solid var(--accent); max-height: 85vh; }
}
.modal h3 {
  font-size: 18px; font-weight: 900; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 18px;
}
.modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }

/* ── Form fields ── */
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 5px;
}
.field input, .field select, .field textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--sans); font-size: 16px;
  padding: 10px 12px; outline: none; transition: border-color .15s;
  -webkit-appearance: none; border-radius: 0;
}
.field textarea { min-height: 80px; resize: vertical; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field select option { background: var(--bg); }

/* ── Autocomplete ── */
.ac-wrap { position: relative; }
.ac-list {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--surface2); border: 1px solid var(--accent);
  z-index: 300; max-height: 200px; overflow-y: auto; display: none;
}
.ac-list.open { display: block; }
.ac-item {
  padding: 10px 12px; cursor: pointer; font-size: 15px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.ac-item:active { background: var(--border); }
.ac-item small { color: var(--muted); font-family: var(--mono); font-size: 11px; }
.ac-create { color: var(--accent); font-style: italic; }

/* ── Search results ── */
.result-row {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: 12px; margin-bottom: 8px;
  cursor: pointer;
}
.result-row:active { background: var(--surface2); }
.result-box { font-family: var(--mono); font-size: 11px; color: var(--accent); margin-bottom: 4px; }
.result-label { font-size: 16px; font-weight: 700; }
.result-items { margin-top: 6px; }

/* ── Print modal ── */
.print-wrap { text-align: center; }
.print-preview {
  background: #fff; color: #000; padding: 16px;
  display: inline-block; border: 2px dashed var(--border);
  text-align: center;
}
.print-qr { display: inline-block; border: 4px solid #000; padding: 8px; background: #fff; margin-bottom: 8px; }
.print-num { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 900; color: #000; line-height: 1; }
.print-label { font-size: 16px; font-weight: 700; color: #333; max-width: 200px; word-break: break-word; margin: 0 auto; }

/* ── View toggle ── */
.view-toggle {
  display: flex; border: 1px solid var(--border); overflow: hidden;
}
.view-btn {
  background: var(--surface2); border: none; color: var(--muted);
  font-size: 16px; padding: 6px 10px; cursor: pointer; transition: all .15s;
  line-height: 1;
}
.view-btn.active { background: var(--accent); color: #000; }
.view-btn:not(.active):hover { color: var(--text); }

/* ── Box list view ── */
.box-list { display: flex; flex-direction: column; gap: 6px; }
.box-list-row {
  background: var(--surface); border: 1px solid var(--border);
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer; transition: border-color .15s;
}
.box-list-row:hover { border-color: var(--accent); }
.box-list-num {
  font-family: var(--mono); font-size: 12px;
  background: var(--accent); color: #000;
  padding: 3px 6px; text-align: center; font-weight: bold;
  white-space: nowrap;
}
.box-list-info { min-width: 0; }
.box-list-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.box-list-meta { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 2px; }
.box-list-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ── Label print preview ── */
.label-preview {
  background: #fff; color: #000;
  display: inline-flex; flex-direction: row;
  align-items: stretch;
  border: 2px dashed var(--border);
  /* size set dynamically via style */
  overflow: hidden;
  gap: 0;
}
.label-left {
  display: flex; flex-direction: column; justify-content: center;
  align-items: center; padding: 6px;
  border-right: 1px solid #ccc;
  flex-shrink: 0;
}
.label-qr-wrap { background: #fff; }
.label-box-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; color: #000; line-height: 1;
  text-align: center; margin-top: 4px;
}
.label-right {
  flex: 1; min-width: 0; display: flex; flex-direction: column;
  justify-content: center; padding: 6px 8px; gap: 3px;
}
.label-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; color: #000; line-height: 1.2;
  word-break: break-word;
}
.label-body {
  font-family: 'Barlow Condensed', sans-serif;
  color: #333; line-height: 1.3; word-break: break-word;
}
.label-room {
  font-family: monospace; color: #666;
  word-break: break-word;
}

@media print {
  body * { visibility: hidden; }
  #print-target, #print-target * { visibility: visible; }
  #print-target {
    position: fixed; top: 0; left: 0;
    border: none !important;
    margin: 0 !important;
  }
}

/* ── Misc ── */
.empty { color: var(--muted); font-family: var(--mono); font-size: 13px; padding: 40px 16px; text-align: center; }

/* ── Qty stepper ── */
.qty-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-size: 22px; font-weight: 700;
  width: 48px; height: 48px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; touch-action: manipulation; user-select: none;
}
.qty-btn:active { background: var(--accent); color: #000; border-color: var(--accent); }
.qty-cell {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 13px;
  text-align: center; padding: 7px 2px; cursor: pointer;
  transition: all .12s;
}
.qty-cell:hover, .qty-cell:active { background: var(--accent); color: #000; border-color: var(--accent); }
.qty-cell.selected { background: var(--accent); color: #000; border-color: var(--accent); }

/* ── Inline qty controls in item rows ── */
.item-qty-control {
  display: flex; align-items: center; gap: 0; flex-shrink: 0;
}
.item-qty-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); font-size: 16px; font-weight: 700;
  width: 30px; height: 30px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s; touch-action: manipulation;
  flex-shrink: 0;
}
.item-qty-btn:active { background: var(--accent); color: #000; border-color: var(--accent); }
.item-qty-num {
  font-family: var(--mono); font-size: 15px; font-weight: bold;
  color: var(--accent); min-width: 32px; text-align: center;
  cursor: pointer; padding: 0 2px; position: relative;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  height: 30px; line-height: 30px;
}
.item-qty-dropdown {
  position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--accent);
  z-index: 200; display: none;
  grid-template-columns: repeat(5,1fr); gap: 2px;
  padding: 4px; min-width: 160px;
}
.item-qty-dropdown.open { display: grid; }
.item-qty-option {
  font-family: var(--mono); font-size: 13px; text-align: center;
  padding: 6px 4px; cursor: pointer; background: var(--surface);
  border: 1px solid var(--border); transition: all .1s;
}
.item-qty-option:hover, .item-qty-option:active,
.item-qty-option.selected { background: var(--accent); color: #000; border-color: var(--accent); }

/* ── Identify suggestion chips ── */
.suggest-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--accent);
  color: var(--accent); font-family: var(--sans); font-weight: 700;
  font-size: 13px; letter-spacing: .5px;
  padding: 6px 10px; cursor: pointer; transition: all .15s;
}
.suggest-chip:hover, .suggest-chip:active { background: var(--accent); color: #000; }

/* ── Spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite;
  vertical-align: middle;
}
.badge { font-family: var(--mono); font-size: 11px; background: var(--surface2); border: 1px solid var(--border); padding: 1px 6px; color: var(--muted); }
.hidden { display: none !important; }
.img-upload-input { display: none; }


/* ── Tablet (640px+): better modals, slightly larger gallery ── */
@media (min-width: 640px) {
  .modal-backdrop { padding: 20px; }
  .modal { border-radius: 0; }
  .panel { padding: 20px 24px; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .gallery-item, .gallery-add { width: 100px; height: 100px; }
  .ac-item:hover { background: var(--border); }
  tr:hover td { background: var(--surface2); }
  .card:hover { border-color: var(--accent); }
  .result-row:hover { background: var(--surface2); }
  .room-row:hover { background: var(--surface2); }
}

/* ── Desktop (900px+): sidebar nav replaces bottom tab bar ── */
@media (min-width: 900px) {
  /* Show sidebar, hide bottom tabs */
  .tabbar { display: none; }
  .sidebar {
    display: flex !important;
    flex-direction: column;
    position: fixed;
    top: var(--nav-h); bottom: 0; left: 0;
    width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    z-index: 50;
  }
  .sidebar button {
    display: block; width: 100%; text-align: left;
    background: none; border: none; border-left: 3px solid transparent;
    color: var(--muted); font-family: var(--sans); font-size: 15px;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    padding: 11px 20px; cursor: pointer; transition: all .15s;
  }
  .sidebar button:hover { color: var(--text); background: var(--surface2); }
  .sidebar button.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }

  /* Push content right of sidebar, remove bottom offset */
  .content {
    left: 200px;
    bottom: 0;
  }

  /* Wider topbar search */
  .topbar .search-box { max-width: 480px; }

  /* Bigger card grid with more columns */
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  /* Larger gallery thumbnails */
  .gallery-item, .gallery-add { width: 120px; height: 120px; }

  /* Constrain detail views so they don't stretch too wide */
  .detail { max-width: 860px; }

  /* Panel padding */
  .panel { padding: 28px 32px; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>BOX<span>TRACK</span></h1>
  <input class="search-box" id="globalSearch" type="search" placeholder="🔍 Search…" oninput="handleSearch(this.value)">
</div>


<!-- Sidebar nav (desktop only, hidden on mobile via CSS) -->
<nav class="sidebar" style="display:none;">

  </div>

  <!-- ROOMS -->

  <!-- SEARCH RESULTS -->

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let rooms = [];
let allItems = [];
let editingBox = null;
let editingRoom = null;
let editingItem = null;
let currentBoxId = null;
let addToBoxId = null;
let uploadTarget = null; // { entity_type, entity_id, refresh }
let searchTimer = null;
let boxView = 'grid'; // 'grid' | 'list'
let currentPrintBox = null; // box object held for label re-render on size change

// ── API ────────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: opts.body && !(opts.body instanceof FormData)
      ? { 'Content-Type': 'application/json' } : {},
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, isErr = false) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'calc(var(--tab-h) + var(--safe-bottom) + 12px)',
    left:'50%', transform:'translateX(-50%)', zIndex:'999',
    padding:'10px 18px',
    background: isErr ? 'var(--danger)' : 'var(--accent)',
    color:'#000', fontFamily:'var(--sans)', fontWeight:'700',
    fontSize:'14px', letterSpacing:'1px',
    boxShadow:'0 4px 20px rgba(0,0,0,.4)',
    whiteSpace:'nowrap', maxWidth:'90vw', overflow:'hidden', textOverflow:'ellipsis',
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ── Navigation ─────────────────────────────────────────────────────────────
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  // Deactivate both nav types
  document.querySelectorAll('.tabbar button, .sidebar button').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  // Activate bottom tab
  const tab = document.getElementById(`tab-${name}`);
  if (tab) tab.classList.add('active');
  // Activate sidebar button
  const sideBtn = document.getElementById(`sidebar-${name}`);
  if (sideBtn) sideBtn.classList.add('active');
  document.getElementById('mainContent').scrollTop = 0;

  if (name === 'boxes') loadBoxes();
  else if (name === 'rooms') loadRooms();
  else if (name === 'items') loadItems();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-backdrop').forEach(bd => {
  bd.addEventListener('click', e => { if (e.target === bd) bd.classList.remove('open'); });
});

// ── Rooms ──────────────────────────────────────────────────────────────────
async function loadRooms() {
  rooms = await api('/api/rooms');
  // Update filter
  const f = document.getElementById('roomFilter');
  const prev = f.value;
  f.innerHTML = '<option value="">All Rooms</option>' +
    rooms.map(r => `<option value="${r.id}" ${prev==r.id?'selected':''}>${esc(r.name)}</option>`).join('');
  // Rooms panel
  const list = document.getElementById('rooms-list');
  if (!rooms.length) { list.innerHTML = '<div class="empty">No rooms yet.</div>'; return; }
  list.innerHTML = rooms.map(r => `
    <div class="room-row">
      <div class="room-row-name">${esc(r.name)}</div>
      <div class="room-row-count">${r.box_count} box${r.box_count!=1?'es':''}</div>
      <button class="btn-icon" onclick="openRoomModal(${r.id})">✏️</button>
      <button class="btn-icon danger" onclick="deleteRoom(${r.id})">🗑</button>
    </div>
  `).join('');
}

function openRoomModal(id = null) {
  editingRoom = id;
  document.getElementById('modal-room-title').textContent = id ? 'Edit Room' : 'Add Room';
  const r = id ? rooms.find(x => x.id === id) : null;
  document.getElementById('room-name').value = r ? r.name : '';
  openModal('modal-room');
}

async function saveRoom() {
  const name = document.getElementById('room-name').value.trim();
  if (!name) { toast('Room name required', true); return; }
  try {
    if (editingRoom)
      await api(`/api/rooms/${editingRoom}`, { method:'PUT', body:JSON.stringify({name}) });
    else
      await api('/api/rooms', { method:'POST', body:JSON.stringify({name}) });
    closeModal('modal-room');
    await loadRooms();
    toast(editingRoom ? 'Room updated' : 'Room added');
  } catch(e) { toast(e.message, true); }
}

async function deleteRoom(id) {
  if (!confirm('Delete room? Boxes will become unassigned.')) return;
  await api(`/api/rooms/${id}`, { method:'DELETE' });
  await loadRooms();
  toast('Room deleted');
}

// ── Boxes ──────────────────────────────────────────────────────────────────
function setBoxView(v) {
  boxView = v;
  document.getElementById('view-grid-btn').classList.toggle('active', v === 'grid');
  document.getElementById('view-list-btn').classList.toggle('active', v === 'list');
  renderBoxes(window._lastBoxes || []);
}

async function loadBoxes() {
  await loadRooms();
  const roomId = document.getElementById('roomFilter').value;
  const url = roomId ? `/api/boxes?room_id=${roomId}` : '/api/boxes';
  const boxes = await api(url);
  window._lastBoxes = boxes;
  renderBoxes(boxes);
}

function renderBoxes(boxes) {
  const container = document.getElementById('boxes-grid');
  if (!boxes.length) {
    container.className = '';
    container.innerHTML = '<div class="empty">No boxes yet. Tap + New to create one.</div>';
    return;
  }

  if (boxView === 'list') {
    container.className = 'box-list';
    container.innerHTML = '';
    boxes.forEach(b => {
      const row = document.createElement('div');
      row.className = 'box-list-row';
      row.innerHTML = `
        <div class="box-list-num">BOX<br>${b.box_number}</div>
        <div class="box-list-info">
          <div class="box-list-title">${esc(b.label || 'Unlabelled')}</div>
          <div class="box-list-meta">${b.room_name ? `📍 ${esc(b.room_name)}` : 'No room'} · ${b.item_count} type${b.item_count!=1?'s':''}</div>
        </div>
        <div class="box-list-actions">
          <button class="btn btn-sm btn-primary">🖨</button>
          <button class="btn btn-sm btn-danger">Del</button>
        </div>`;
      // delegated — avoid onclick string interpolation
      row.dataset.boxId = b.id;
      row.querySelector('.box-list-info').addEventListener('click', () => openBoxDetail(b.id));
      row.querySelector('.box-list-num').addEventListener('click', () => openBoxDetail(b.id));
      row.querySelectorAll('.box-list-actions button')[0].addEventListener('click', e => { e.stopPropagation(); openPrintModal(b.id); });
      row.querySelectorAll('.box-list-actions button')[1].addEventListener('click', e => { e.stopPropagation(); deleteBox(b.id); });
      container.appendChild(row);
    });
  } else {
    container.className = 'card-grid';
    container.innerHTML = '';
    boxes.forEach(b => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-thumb">
          ${b.thumb_url ? `<img src="${b.thumb_url}" alt="box photo" loading="lazy">` : `<span>📦</span>`}
        </div>
        <div class="card-body">
          <div class="card-num">BOX ${b.box_number}</div>
          <div class="card-title">${esc(b.label || 'Unlabelled')}</div>
          <div class="card-meta">${b.room_name ? `📍 ${esc(b.room_name)}` : 'No room'} · ${b.item_count} type${b.item_count!=1?'s':''}</div>
          ${b.description ? `<div class="card-desc">${esc(b.description.substring(0,80))}${b.description.length>80?'…':''}</div>` : ''}
          <div class="card-actions"></div>
        </div>`;
      // Actions via JS to avoid interpolation
      const actions = card.querySelector('.card-actions');
      const editBtn = document.createElement('button');
      editBtn.className = 'btn btn-sm btn-secondary'; editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', e => { e.stopPropagation(); openBoxModal(b.id); });
      const printBtn = document.createElement('button');
      printBtn.className = 'btn btn-sm btn-primary'; printBtn.textContent = '🖨';
      printBtn.addEventListener('click', e => { e.stopPropagation(); openPrintModal(b.id); });
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-sm btn-danger'; delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', e => { e.stopPropagation(); deleteBox(b.id); });
      actions.appendChild(editBtn); actions.appendChild(printBtn); actions.appendChild(delBtn);
      card.addEventListener('click', () => openBoxDetail(b.id));
      container.appendChild(card);
    });
  }
}

function openBoxModal(id = null) {
  editingBox = id;
  document.getElementById('modal-box-title').textContent = id ? 'Edit Box' : 'New Box';
  const sel = document.getElementById('box-room');
  sel.innerHTML = '<option value="">— No Room —</option>' +
    rooms.map(r => `<option value="${r.id}">${esc(r.name)}</option>`).join('');
  if (id) {
    api(`/api/boxes/${id}`).then(b => {
      document.getElementById('box-label').value = b.label || '';
      document.getElementById('box-description').value = b.description || '';
      sel.value = b.room_id || '';
    });
  } else {
    document.getElementById('box-label').value = '';
    document.getElementById('box-description').value = '';
    sel.value = '';
  }
  openModal('modal-box');
}

async function saveBox() {
  const label = document.getElementById('box-label').value.trim();
  const description = document.getElementById('box-description').value.trim();
  const room_id = document.getElementById('box-room').value || null;
  try {
    if (editingBox) {
      await api(`/api/boxes/${editingBox}`, { method:'PUT', body:JSON.stringify({label, description, room_id}) });
      closeModal('modal-box');
      toast('Box updated');
      openBoxDetail(editingBox);
    } else {
      const box = await api('/api/boxes', { method:'POST', body:JSON.stringify({label, description, room_id}) });
      closeModal('modal-box');
      toast(`Box #${box.box_number} created`);
      loadBoxes();
    }
  } catch(e) { toast(e.message, true); }
}

async function deleteBox(id) {
  if (!confirm('Delete this box and all its contents?')) return;
  await api(`/api/boxes/${id}`, { method:'DELETE' });
  toast('Box deleted');
  showPanel('boxes');
}

// ── Box Detail ─────────────────────────────────────────────────────────────
async function openBoxDetail(id) {
  currentBoxId = id;
  const box = await api(`/api/boxes/${id}`);

  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tabbar button, .sidebar button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-box-detail').classList.add('active');
  // Keep "Boxes" highlighted in nav while viewing a box
  const tb = document.getElementById('tab-boxes');
  if (tb) tb.classList.add('active');
  const sb = document.getElementById('sidebar-boxes');
  if (sb) sb.classList.add('active');
  document.getElementById('mainContent').scrollTop = 0;

  // Build item rows using DOM — never inline data in HTML strings
  const itemRowsEl = document.createElement('div');
  if (box.items.length) {
    box.items.forEach(i => {
      const row = document.createElement('div');
      row.className = 'item-row';

      // Info section
      const info = document.createElement('div');
      info.className = 'item-row-info';
      const nameEl = document.createElement('div');
      nameEl.className = 'item-row-name';
      nameEl.textContent = i.name;
      const metaEl = document.createElement('div');
      metaEl.className = 'item-row-meta';
      if (i.category) {
        const chip = document.createElement('span');
        chip.className = 'chip cat';
        chip.textContent = i.category;
        metaEl.appendChild(chip);
      }
      if (i.notes) {
        const noteSpan = document.createElement('span');
        noteSpan.textContent = ' · ' + i.notes;
        metaEl.appendChild(noteSpan);
      }
      info.appendChild(nameEl);
      info.appendChild(metaEl);

      // Inline qty control: [−] [num▾] [+]
      const qtyCtrl = document.createElement('div');
      qtyCtrl.className = 'item-qty-control';

      const minusBtn = document.createElement('button');
      minusBtn.className = 'item-qty-btn';
      minusBtn.textContent = '−';
      minusBtn.dataset.action = 'qty-minus';
      minusBtn.dataset.id = i.box_item_id;

      const numWrap = document.createElement('div');
      numWrap.style.position = 'relative';

      const numEl = document.createElement('div');
      numEl.className = 'item-qty-num';
      numEl.textContent = i.quantity;
      numEl.dataset.action = 'qty-pick';
      numEl.dataset.id = i.box_item_id;
      numEl.dataset.qty = i.quantity;

      // Dropdown grid 0–99
      const dropdown = document.createElement('div');
      dropdown.className = 'item-qty-dropdown';
      dropdown.id = `qty-dd-${i.box_item_id}`;
      for (let n = 0; n <= 99; n++) {
        const opt = document.createElement('div');
        opt.className = 'item-qty-option' + (n === i.quantity ? ' selected' : '');
        opt.textContent = n;
        opt.dataset.action = 'qty-select';
        opt.dataset.id = i.box_item_id;
        opt.dataset.val = n;
        dropdown.appendChild(opt);
      }

      const plusBtn = document.createElement('button');
      plusBtn.className = 'item-qty-btn';
      plusBtn.textContent = '+';
      plusBtn.dataset.action = 'qty-plus';
      plusBtn.dataset.id = i.box_item_id;

      numWrap.appendChild(numEl);
      numWrap.appendChild(dropdown);
      qtyCtrl.appendChild(minusBtn);
      qtyCtrl.appendChild(numWrap);
      qtyCtrl.appendChild(plusBtn);

      // Edit & remove buttons
      const editBtn = document.createElement('button');
      editBtn.className = 'btn-icon';
      editBtn.dataset.action = 'edit-box-item';
      editBtn.dataset.id = i.box_item_id;
      editBtn.dataset.qty = i.quantity;
      editBtn.dataset.notes = i.notes || '';
      editBtn.dataset.name = i.name;
      editBtn.textContent = '✏️';

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-icon danger';
      delBtn.dataset.action = 'remove-box-item';
      delBtn.dataset.id = i.box_item_id;
      delBtn.textContent = '🗑';

      row.appendChild(info);
      row.appendChild(qtyCtrl);
      row.appendChild(editBtn);
      row.appendChild(delBtn);
      itemRowsEl.appendChild(row);
    });
  } else {
    itemRowsEl.innerHTML = '<div class="empty">No items yet.</div>';
  }
  const itemsHtml = itemRowsEl.innerHTML;

  const imagesHtml = renderGallery(box.images, 'box', box.id);

  document.getElementById('box-detail-content').innerHTML = `
    <div class="detail">
      <div class="detail-back">
        <button class="btn btn-secondary btn-sm" onclick="showPanel('boxes')">← Back</button>
      </div>
      <div class="detail-hdr">
        <div class="detail-num">${box.box_number}</div>
        <div style="flex:1;min-width:0;">
          <div class="detail-title">${esc(box.label || 'Unlabelled Box')}</div>
          <div class="detail-room">📍 ${esc(box.room_name || 'No room assigned')}</div>
          ${box.description ? `<div class="detail-desc">${esc(box.description)}</div>` : ''}
        </div>
        <div class="detail-actions">
          <button class="btn btn-secondary btn-sm" onclick="openBoxModal(${box.id})">Edit</button>
          <button class="btn btn-primary btn-sm" onclick="openPrintModal(${box.id})">🖨</button>
        </div>
      </div>

      <div class="section-hdr">
        <h3>Photos</h3>
        <button class="btn btn-secondary btn-sm" data-action="upload-box-photo" data-box-id="${box.id}">+ Photo</button>
      </div>
      <div id="gallery-box-${box.id}" class="gallery">${imagesHtml}</div>

      <div class="section-hdr">
        <h3>Contents (${box.items.length})</h3>
        <button class="btn btn-primary btn-sm" onclick="openAddToBoxModal(${box.id})">+ Item</button>
      </div>
      <div id="box-items-list">${itemsHtml}</div>
    </div>
  `;
}

function renderGallery(images, entityType, entityId) {
  // Build via DOM to avoid putting URLs/strings inside onclick attributes
  const wrap = document.createElement('div');
  images.forEach(img => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.id = `img-${img.id}`;

    const imgEl = document.createElement('img');
    imgEl.src = img.url;
    imgEl.loading = 'lazy';
    imgEl.dataset.action = 'view-image';
    imgEl.dataset.url = img.url;

    const delBtn = document.createElement('button');
    delBtn.className = 'del-img';
    delBtn.textContent = '✕';
    delBtn.dataset.action = 'delete-image';
    delBtn.dataset.imageId = img.id;
    delBtn.dataset.entityType = entityType;
    delBtn.dataset.entityId = entityId;

    item.appendChild(imgEl);
    item.appendChild(delBtn);
    wrap.appendChild(item);
  });
  return wrap.innerHTML;
}

// Close any open qty dropdowns when clicking outside
document.addEventListener('click', e => {

    document.querySelectorAll('.item-qty-dropdown.open').forEach(d => d.classList.remove('open'));
  }

// Delegated listener for the box-detail panel
document.getElementById('panel-box-detail').addEventListener('click', async e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'remove-box-item') {
    if (!confirm('Remove this item from the box?')) return;
    await api(`/api/box-items/${btn.dataset.id}`, { method:'DELETE' });
    toast('Item removed');
    openBoxDetail(currentBoxId);

  } else if (action === 'edit-box-item') {
    openEditBoxItemModal(btn.dataset.id, btn.dataset.qty, btn.dataset.notes, btn.dataset.name);

  } else if (action === 'qty-minus') {
    const numEl = btn.closest('.item-qty-control').querySelector('.item-qty-num');
    const cur = parseInt(numEl.textContent) || 0;
    const next = Math.max(0, cur - 1);
    await patchQty(btn.dataset.id, next, numEl);

  } else if (action === 'qty-plus') {
    const numEl = btn.closest('.item-qty-control').querySelector('.item-qty-num');
    const cur = parseInt(numEl.textContent) || 0;
    const next = Math.min(99, cur + 1);
    await patchQty(btn.dataset.id, next, numEl);

  } else if (action === 'qty-pick') {
    // Toggle the dropdown
    const dd = document.getElementById(`qty-dd-${btn.dataset.id}`);
    const wasOpen = dd.classList.contains('open');
    document.querySelectorAll('.item-qty-dropdown.open').forEach(d => d.classList.remove('open'));
    if (!wasOpen) dd.classList.add('open');

  } else if (action === 'qty-select') {
    e.stopPropagation();
    const val = parseInt(btn.dataset.val);
    const dd = btn.closest('.item-qty-dropdown');
    dd.classList.remove('open');
    const numEl = dd.previousElementSibling; // the .item-qty-num div
    await patchQty(btn.dataset.id, val, numEl);

  } else if (action === 'view-image') {
    viewImage(btn.dataset.url);

  } else if (action === 'delete-image') {
    if (!confirm('Delete this photo?')) return;
    await api(`/api/images/${btn.dataset.imageId}`, { method:'DELETE' });
    toast('Photo deleted');
    if (btn.dataset.entityType === 'box') openBoxDetail(parseInt(btn.dataset.entityId));

  } else if (action === 'upload-box-photo') {
    const boxId = parseInt(btn.dataset.boxId);
    triggerImageUpload('box', boxId, () => openBoxDetail(boxId));
  }
});

async function patchQty(boxItemId, newQty, numEl) {
  // Optimistic update of the display number
  numEl.textContent = newQty;
  numEl.dataset.qty = newQty;
  // Update selected state in dropdown
  const dd = document.getElementById(`qty-dd-${boxItemId}`);
  if (dd) {
    dd.querySelectorAll('.item-qty-option').forEach(o => {
      o.classList.toggle('selected', parseInt(o.dataset.val) === newQty);
    });
  }
  try {
    // Get current notes from the edit button's data
    const editBtn = numEl.closest('.item-row')?.querySelector('[data-action="edit-box-item"]');
    const notes = editBtn ? editBtn.dataset.notes : '';
    await api(`/api/box-items/${boxItemId}`, {
      method: 'PUT',
      body: JSON.stringify({ quantity: newQty, notes })
    });
    // Update edit button's cached qty
    if (editBtn) editBtn.dataset.qty = newQty;
  } catch(err) {
    toast('Failed to update quantity', true);
    openBoxDetail(currentBoxId); // refresh to get real state
  }
}

function openEditBoxItemModal(boxItemId, qty, notes, name) {
  document.getElementById('edit-item-box-item-id').value = boxItemId;
  document.getElementById('edit-item-name-display').textContent = name || '';
  document.getElementById('edit-item-qty').value = qty || 1;
  document.getElementById('edit-item-notes').value = notes || '';
  document.getElementById('edit-qty-grid').style.display = 'none';

  // Build qty number grid 0–99
  const cells = document.getElementById('edit-qty-cells');
  cells.innerHTML = '';
  for (let n = 0; n <= 99; n++) {
    const c = document.createElement('div');
    c.className = 'qty-cell' + (n === parseInt(qty) ? ' selected' : '');
    c.textContent = n;
    c.addEventListener('click', () => {
      document.getElementById('edit-item-qty').value = n;
      cells.querySelectorAll('.qty-cell').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected');
      document.getElementById('edit-qty-grid').style.display = 'none';
    });
    cells.appendChild(c);
  }

  // Minus / plus buttons in modal
  document.getElementById('edit-qty-minus').onclick = () => {
    const inp = document.getElementById('edit-item-qty');
    inp.value = Math.max(0, (parseInt(inp.value)||0) - 1);
  };
  document.getElementById('edit-qty-plus').onclick = () => {
    const inp = document.getElementById('edit-item-qty');
    inp.value = Math.min(99, (parseInt(inp.value)||0) + 1);
  };

  // Tap the number to toggle the grid
  document.getElementById('edit-item-qty').addEventListener('click', () => {
    const grid = document.getElementById('edit-qty-grid');
    grid.style.display = grid.style.display === 'none' ? 'block' : 'none';
  }, { once: false });

  // Remove button wired to box item id
  document.getElementById('edit-item-remove-btn').onclick = async () => {
    if (!confirm('Remove this item from the box?')) return;
    closeModal('modal-edit-item');
    await api(`/api/box-items/${boxItemId}`, { method: 'DELETE' });
    toast('Item removed');
    openBoxDetail(currentBoxId);
  };

  openModal('modal-edit-item');
}

let visionConfig = { backend: 'none', ready: false };

async function loadVisionConfig() {

  }

function triggerIdentifyPhoto() {
  const inp = document.getElementById('atb-identify-input');
  inp.value = '';
  inp.click();
}

async function handleIdentifyPhoto(input) {
  if (!input.files.length) return;
  const file = input.files[0];
  const statusEl = document.getElementById('atb-identify-status');
  const chipsEl = document.getElementById('atb-suggestions-chips');
  const btn = document.getElementById('atb-identify-btn');

  chipsEl.innerHTML = '';
  statusEl.innerHTML = '<span class="spinner"></span> Identifying…';
  btn.disabled = true;

  // Also stage this photo as an item photo (user took the pic for a reason)
  atbPendingPhotos.push(file);
  const url = URL.createObjectURL(file);
  const idx = atbPendingPhotos.length - 1;
  const div = document.createElement('div');
  div.className = 'gallery-item';
  div.id = `atb-pending-${idx}`;
  div.innerHTML = `<img src="${url}"><button class="del-img" onclick="removeATBPhoto(${idx})">✕</button>`;
  document.getElementById('atb-photo-preview').appendChild(div);

  try {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/identify', { method: 'POST', body: fd });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Identification failed');

    const suggestions = data.suggestions || [];
    if (!suggestions.length) {
      statusEl.textContent = 'No items detected — type a name below';
      btn.disabled = false;
      return;
    }

    statusEl.textContent = 'Tap a suggestion or type your own:';
    suggestions.forEach(name => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'suggest-chip';
      chip.textContent = name;
      chip.addEventListener('click', () => {
        // Put the suggestion into the search field and try to match an existing item
        document.getElementById('atb-search').value = name;
        document.getElementById('atb-item-id').value = '';
        setATBSelection(null, null, null); // reset badge so search field shows
        document.getElementById('atb-search').value = name;
        // Trigger a search to see if item exists
        searchItemsAC(name);
        chip.style.background = 'var(--accent)';
        chip.style.color = '#000';
        // Scroll to item field
        document.getElementById('atb-search').scrollIntoView({ behavior: 'smooth', block: 'center' });
        document.getElementById('atb-search').focus();
      });
      chipsEl.appendChild(chip);
    });
  } catch(e) {
    statusEl.textContent = `Error: ${e.message}`;
    toast(e.message, true);
  } finally {
    btn.disabled = false;
  }
}

// Show/hide the "selected item" badge and category field
function setATBSelection(id, name, cat) {
  const badge = document.getElementById('atb-selected-badge');
  const catField = document.getElementById('atb-category-field');
  const searchInput = document.getElementById('atb-search');
  if (id) {
    document.getElementById('atb-item-id').value = id;

    badge.style.display = 'flex';
    searchInput.style.display = 'none';

  } else {
    document.getElementById('atb-item-id').value = '';
    badge.style.display = 'none';
    searchInput.style.display = '';
    catField.style.display = '';
  }
}

function clearATBItem() {
  setATBSelection(null, null, null);
  const inp = document.getElementById('atb-search');
  inp.value = '';
  inp.focus();
}

async function searchItemsAC(q) {
  // Don't search if an item is already selected
  if (document.getElementById('atb-item-id').value) return;
  const list = document.getElementById('atb-suggestions');
  if (!q.trim()) { list.classList.remove('open'); return; }
  const items = await api(`/api/items?q=${encodeURIComponent(q)}`);

  // Use data-* attributes instead of inline onclick with interpolated strings —
  // inline onclick breaks on any item name containing quotes or apostrophes.
  const rows = items.map(i => {
    const div = document.createElement('div');
    div.className = 'ac-item';
    div.dataset.itemId = i.id;
    div.dataset.itemName = i.name;
    div.dataset.itemCat = i.category || '';
    div.innerHTML = `<span>${esc(i.name)}</span><small>${esc(i.category||'')}</small>`;
    return div.outerHTML;
  }).join('');

  const createDiv = document.createElement('div');
  createDiv.className = 'ac-item ac-create';
  createDiv.dataset.createNew = '1';
  createDiv.textContent = `+ Create "${q}"`;

  list.innerHTML = rows;
  list.appendChild(createDiv);
  list.classList.add('open');
}

// Single delegated listener on the suggestions list — avoids all inline-onclick quoting issues
document.getElementById('atb-suggestions').addEventListener('mousedown', e => {
  e.preventDefault(); // prevent input blur before click registers
});
document.getElementById('atb-suggestions').addEventListener('click', e => {
  const item = e.target.closest('.ac-item');
  if (!item) return;
  if (item.dataset.createNew) {
    // User wants to create a new item with the typed name
    document.getElementById('atb-item-id').value = '';
    document.getElementById('atb-suggestions').classList.remove('open');
  } else {
    setATBSelection(item.dataset.itemId, item.dataset.itemName, item.dataset.itemCat);
    document.getElementById('atb-suggestions').classList.remove('open');
  }
});

// Photo handling for the ATB modal
function triggerATBPhoto() {
  const inp = document.getElementById('atb-photo-input');
  inp.value = '';
  inp.click();
}

function handleATBPhotoSelect(input) {
  const preview = document.getElementById('atb-photo-preview');
  for (const file of input.files) {
    atbPendingPhotos.push(file);
    const url = URL.createObjectURL(file);
    const idx = atbPendingPhotos.length - 1;
    const div = document.createElement('div');
    div.className = 'gallery-item';
    div.id = `atb-pending-${idx}`;
    div.innerHTML = `<img src="${url}"><button class="del-img" onclick="removeATBPhoto(${idx})">✕</button>`;
    preview.appendChild(div);
  }
}

function removeATBPhoto(idx) {
  atbPendingPhotos[idx] = null; // null = removed
  const el = document.getElementById(`atb-pending-${idx}`);
  if (el) el.remove();
}

async function uploadPendingPhotos(itemId) {
  for (const file of atbPendingPhotos) {
    if (!file) continue;
    const fd = new FormData();
    fd.append('file', file);
    fd.append('entity_type', 'item');
    fd.append('entity_id', itemId);
    try {
      await fetch('/api/images/upload', { method: 'POST', body: fd });
    } catch(e) {
      toast(`Photo upload failed: ${e.message}`, true);
    }
  }
}

async function confirmAddToBox() {
  let item_id = document.getElementById('atb-item-id').value;
  const qty = parseInt(document.getElementById('atb-qty').value) || 1;
  const notes = document.getElementById('atb-notes').value.trim();
  const category = document.getElementById('atb-category').value.trim();

  if (!item_id) {
    // Creating a new item
    const name = document.getElementById('atb-search').value.trim();
    if (!name) { toast('Enter an item name', true); return; }
    const newItem = await api('/api/items', { method:'POST', body:JSON.stringify({name, category}) });
    item_id = newItem.id;
  }

  // Upload any staged photos against the item
  const photoCount = atbPendingPhotos.filter(Boolean).length;
  if (photoCount > 0) {
    await uploadPendingPhotos(item_id);
  }

  await api(`/api/boxes/${addToBoxId}/items`, {
    method:'POST', body:JSON.stringify({ item_id, quantity:qty, notes })
  });
  closeModal('modal-atb');
  toast(`Item added${photoCount > 0 ? ` with ${photoCount} photo${photoCount>1?'s':''}` : ''}`);
  openBoxDetail(addToBoxId);
}

// ── Items ──────────────────────────────────────────────────────────────────
async function loadItems() {
  allItems = await api('/api/items');
  renderItems(allItems);
}

function renderItems(items) {
  const tbody = document.getElementById('items-tbody');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">No items yet.</td></tr>'; return;
  }
  tbody.innerHTML = items.map(i => `
    <tr>
      <td>${esc(i.name)}</td>
      <td><span class="chip cat">${esc(i.category||'—')}</span></td>
      <td class="mono" style="font-family:var(--mono);font-size:12px;">
        ${i.in_boxes ? i.in_boxes.split(',').map(n=>`<span class="badge">#${n}</span>`).join('') : '<span style="color:var(--muted)">—</span>'}
      </td>
      <td>
        <button class="btn-icon" onclick="openItemModal(${i.id})">✏️</button>
        <button class="btn-icon danger" onclick="deleteItem(${i.id})">🗑</button>
      </td>
    </tr>
  `).join('');
}

function filterItems(q) {
  if (!q) { renderItems(allItems); return; }
  const lq = q.toLowerCase();
  renderItems(allItems.filter(i =>
    i.name.toLowerCase().includes(lq) || (i.category||'').toLowerCase().includes(lq)
  ));
}

function openItemModal(id = null) {
  editingItem = id;
  document.getElementById('modal-item-title').textContent = id ? 'Edit Item' : 'Add Item';
  const item = id ? allItems.find(x => x.id === id) : null;
  document.getElementById('item-name').value = item ? item.name : '';
  document.getElementById('item-category').value = item ? (item.category||'') : '';
  document.getElementById('cat-suggestions').classList.remove('open');
  openModal('modal-item');
}

async function saveItem() {
  const name = document.getElementById('item-name').value.trim();
  const category = document.getElementById('item-category').value.trim();
  if (!name) { toast('Item name required', true); return; }
  try {
    if (editingItem)
      await api(`/api/items/${editingItem}`, { method:'PUT', body:JSON.stringify({name, category}) });
    else
      await api('/api/items', { method:'POST', body:JSON.stringify({name, category}) });
    closeModal('modal-item');
    toast(editingItem ? 'Item updated' : 'Item added');
    await loadItems();
  } catch(e) { toast(e.message, true); }
}

async function deleteItem(id) {
  if (!confirm('Delete this item? It will be removed from all boxes.')) return;
  await api(`/api/items/${id}`, { method:'DELETE' });
  toast('Item deleted');
  await loadItems();
}

// ── Category autocomplete ──────────────────────────────────────────────────
async function searchCategories(q, listId) {
  const list = document.getElementById(listId);
  if (!q.trim()) { list.classList.remove('open'); return; }
  const cats = await api(`/api/categories?q=${encodeURIComponent(q)}`);
  const matches = cats.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
  const exact = matches.some(c => c.name.toLowerCase() === q.toLowerCase());

  // Build items with data-* to avoid quoting issues in onclick attributes
  list.innerHTML = '';
  matches.forEach(c => {
    const div = document.createElement('div');
    div.className = 'ac-item';
    div.dataset.catName = c.name;
    div.dataset.listId = listId;
    div.textContent = c.name;
    list.appendChild(div);
  });
  if (!exact && q.trim()) {
    const div = document.createElement('div');
    div.className = 'ac-item ac-create';
    div.dataset.catName = q;
    div.dataset.listId = listId;
    div.textContent = `+ Create "${q}"`;
    list.appendChild(div);
  }
  if (!list.children.length) { list.classList.remove('open'); return; }
  list.classList.add('open');
}

// Delegated listener for all category suggestion lists
document.addEventListener('mousedown', e => {
  if (e.target.closest('.ac-list') && e.target.closest('.ac-item[data-cat-name]')) {
    e.preventDefault();
  }
});
document.addEventListener('click', e => {
  const item = e.target.closest('.ac-item[data-cat-name]');
  if (!item) return;
  const name = item.dataset.catName;
  const listId = item.dataset.listId;
  const list = document.getElementById(listId);
  const input = list.previousElementSibling;
  input.value = name;
  list.classList.remove('open');
});

// ── Images ─────────────────────────────────────────────────────────────────
function triggerImageUpload(entityType, entityId, refreshFn) {
  uploadTarget = { entityType, entityId, refreshFn };
  const inp = document.getElementById('img-input');
  inp.value = '';
  inp.click();
}

async function handleImageUpload(input) {
  if (!uploadTarget || !input.files.length) return;
  const { entityType, entityId, refreshFn } = uploadTarget;
  let uploaded = 0;
  for (const file of input.files) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('entity_type', entityType);
    fd.append('entity_id', entityId);
    try {
      await fetch('/api/images/upload', { method:'POST', body:fd });
      uploaded++;
    } catch(e) {
      toast(`Failed to upload ${file.name}`, true);
    }
  }
  if (uploaded) {
    toast(`${uploaded} photo${uploaded>1?'s':''} uploaded`);
    refreshFn();
  }
}

async function deleteImage(imageId, entityType, entityId) {
  if (!confirm('Delete this photo?')) return;
  await api(`/api/images/${imageId}`, { method:'DELETE' });
  toast('Photo deleted');
  if (entityType === 'box') openBoxDetail(entityId);
}

function viewImage(url) {
  const overlay = document.createElement('div');
  Object.assign(overlay.style, {
    position:'fixed', inset:'0', background:'rgba(0,0,0,.92)',
    zIndex:'500', display:'flex', alignItems:'center', justifyContent:'center',
    cursor:'pointer',
  });
  overlay.innerHTML = `<img src="${url}" style="max-width:95vw;max-height:90vh;object-fit:contain;">`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

// ── Print / QR ─────────────────────────────────────────────────────────────
// Niimbot B1 label sizes: { key: [widthMM, heightMM] }
// We render at 96 DPI screen preview (~3.78px per mm), but print CSS uses mm directly.
const LABEL_SIZES = {
  '50x30': [50, 30], '40x30': [40, 30], '40x40': [40, 40], '50x50': [50, 50],
  '40x60': [40, 60], '40x70': [40, 70], '50x70': [50, 70], '50x80': [50, 80],
};
const MM_TO_PX = 3.3; // approx screen preview scale

async function openPrintModal(boxId) {
  const box = await api(`/api/boxes/${boxId}`);
  currentPrintBox = box;
  openModal('modal-print');
  updateLabelPreview();
}

function updateLabelPreview() {
  if (!currentPrintBox) return;
  const box = currentPrintBox;
  const sizeKey = document.getElementById('label-size-select').value;
  const [wMM, hMM] = LABEL_SIZES[sizeKey] || [50, 70];
  const isLandscape = wMM >= hMM; // e.g. 50x30 is landscape, 50x70 is portrait

  // Body text: prefer description, fall back to unique categories
  let bodyText = box.description || '';
  if (!bodyText && box.items && box.items.length) {
    const cats = [...new Set(box.items.map(i => i.category).filter(Boolean))];
    bodyText = cats.length ? cats.join(', ') : '';
  }

  const qrSize = Math.round(Math.min(wMM, hMM) * MM_TO_PX * (isLandscape ? 0.7 : 0.45));
  const numSize = Math.max(10, Math.round(qrSize * 0.32));
  const titleSize = Math.max(9, Math.round(Math.min(wMM, hMM) * MM_TO_PX * 0.12));
  const bodySize = Math.max(7, Math.round(titleSize * 0.8));

  const target = document.getElementById('print-target');
  // Set preview dimensions (screen px) and print dimensions (mm via data attrs)
  const pxW = Math.round(wMM * MM_TO_PX);
  const pxH = Math.round(hMM * MM_TO_PX);
  target.className = 'label-preview';
  target.style.cssText = `width:${pxW}px;height:${pxH}px;flex-direction:${isLandscape ? 'row' : 'column'};`;
  target.dataset.printW = wMM;
  target.dataset.printH = hMM;

  // Left/top section: QR + box number
  const leftDiv = document.createElement('div');
  leftDiv.className = 'label-left';
  if (isLandscape) {
    leftDiv.style.cssText = `width:${Math.round(pxH * 1.05)}px;`;
  } else {
    leftDiv.style.cssText = `height:${Math.round(pxW * 0.6)}px;flex-direction:row;gap:6px;border-right:none;border-bottom:1px solid #ccc;`;
  }

  const qrWrap = document.createElement('div');
  qrWrap.className = 'label-qr-wrap';
  qrWrap.id = 'qr-container';
  new QRCode(qrWrap, {
    text: `${location.origin}/?box=${box.box_number}`,
    width: qrSize, height: qrSize,
    correctLevel: QRCode.CorrectLevel.M,
  });

  const numEl = document.createElement('div');
  numEl.className = 'label-box-num';
  numEl.style.fontSize = numSize + 'px';
  numEl.textContent = `BOX ${box.box_number}`;

  leftDiv.appendChild(qrWrap);
  leftDiv.appendChild(numEl);

  // Right/bottom section: label + body text
  const rightDiv = document.createElement('div');
  rightDiv.className = 'label-right';

  if (box.label) {
    const titleEl = document.createElement('div');
    titleEl.className = 'label-title';
    titleEl.style.fontSize = titleSize + 'px';
    titleEl.textContent = box.label;
    rightDiv.appendChild(titleEl);
  }

  if (bodyText) {
    const bodyEl = document.createElement('div');
    bodyEl.className = 'label-body';
    bodyEl.style.fontSize = bodySize + 'px';
    bodyEl.textContent = bodyText.length > 120 ? bodyText.substring(0, 120) + '…' : bodyText;
    rightDiv.appendChild(bodyEl);
  }

  if (box.room_name) {
    const roomEl = document.createElement('div');
    roomEl.className = 'label-room';
    roomEl.style.fontSize = Math.max(6, bodySize - 1) + 'px';
    roomEl.textContent = `📍 ${box.room_name}`;
    rightDiv.appendChild(roomEl);
  }

  target.innerHTML = '';
  target.appendChild(leftDiv);
  target.appendChild(rightDiv);

  // Inject a dynamic @page rule for printing at the correct size
  let styleEl = document.getElementById('print-page-style');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'print-page-style';
    document.head.appendChild(styleEl);
  }
  styleEl.textContent = `@media print { @page { size: ${wMM}mm ${hMM}mm; margin: 0; } }`;
}

// ── Global Search ──────────────────────────────────────────────────────────
function handleSearch(q) {
  clearTimeout(searchTimer);
  if (!q.trim()) { showPanel('boxes'); return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
}

async function doSearch(q) {
  const results = await api(`/api/search?q=${encodeURIComponent(q)}`);
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tabbar button, .sidebar button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-search').classList.add('active');
  document.getElementById('mainContent').scrollTop = 0;

  const div = document.getElementById('search-results');
  if (!results.length) { div.innerHTML = '<div class="empty">No results.</div>'; return; }

  const byBox = {};
  results.forEach(r => {
    if (!byBox[r.box_id]) byBox[r.box_id] = { ...r, matches:[] };
    byBox[r.box_id].matches.push(r);
  });

  div.innerHTML = Object.values(byBox).map(b => `
    <div class="result-row" onclick="openBoxDetail(${b.box_id})">
      <div class="result-box">BOX ${b.box_number} · 📍 ${esc(b.room_name||'No room')}</div>
      <div class="result-label">${esc(b.label||'Unlabelled')}</div>
      <div class="result-items">
        ${b.matches.map(m=>`<span class="chip">${esc(m.item_name)} ×${m.quantity}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

// Close autocomplete lists on outside tap
document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap'))
    document.querySelectorAll('.ac-list').forEach(l => l.classList.remove('open'));
});

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  await loadRooms();
  loadBoxes();
  loadVisionConfig(); // non-blocking — vision is optional
})();
</script>
